apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xkeycloakgroups.crossplane.platform.example.io
  annotations:
    platform.kratix.io/contracts: '{"provides":[{"kind":"keycloak-group","name":"${spec.group}","defaultName":"team-${spec.team}","severity":"suggest"}]}'
spec:
  scope: Namespaced
  group: crossplane.platform.example.io
  names:
    kind: XKeycloakGroup
    plural: xkeycloakgroups
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - group
              properties:
                group:
                  type: string
                  pattern: ^[a-z][a-z0-9-]*$
                  maxLength: 63
                  description: Nom du groupe Keycloak géré par la plateforme (ex. team-vente).
                realm:
                  type: string
                  default: platform
                  description: Realm Keycloak.
                role:
                  type: string
                  enum:
                    - consumer
                    - provider
                  description: Rôle de gouvernance de la squad (posé en attribut du groupe
                    Keycloak, lu par le RBAC portail). Omis = pas d'attribut.
            status:
              type: object
              properties:
                groupId:
                  type: string
                  description: UUID Keycloak du groupe créé (status.atProvider.id).
