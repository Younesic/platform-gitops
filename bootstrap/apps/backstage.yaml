# Backstage (portail dev) — GitOps app-of-apps. Manifestes bruts (image custom, pas de chart Helm) :
# deployment + service + ingress + ConfigMap app-config + RBAC ingestor + DB CNPG + Client Keycloak + SealedSecret.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: backstage, namespace: argocd }
spec:
  project: default
  source:
    repoURL: git@github.com:Younesic/platform-gitops.git
    targetRevision: main
    path: bootstrap/manifests/backstage
  destination: { server: https://kubernetes.default.svc, namespace: backstage }
  syncPolicy:
    automated: { selfHeal: true, prune: false }
    syncOptions: [ CreateNamespace=true, ServerSideApply=true, RespectIgnoreDifferences=true ]
  # Le CronJob backstage-customresources-sync met à jour la ConfigMap dynamique
  # et annote le pod template (hash) — drifts VOULUS, à ne pas selfHeal.
  ignoreDifferences:
    - kind: ConfigMap
      name: backstage-config-dynamic
      namespace: backstage
      jsonPointers: [/data]
    # BR4 : périmètre Kyverno, réécrit par le CronJob (pattern config-dynamic)
    - kind: ConfigMap
      name: operator-families
      namespace: backstage
      jsonPointers: [/data]
    - group: apps
      kind: Deployment
      name: backstage
      namespace: backstage
      jqPathExpressions:
        - .spec.template.metadata.annotations."dynamic-config-hash"
