# Câblage Kratix : GitStateStore (repo kratix-state) + Destination worker-1 + secrets scellés.
# Wave 2 : après que les CRDs Kratix existent (wave 1).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kratix-config
  namespace: argocd
  annotations: { argocd.argoproj.io/sync-wave: "2" }
spec:
  project: default
  source: { repoURL: git@github.com:Younesic/platform-gitops.git, targetRevision: main, path: bootstrap/manifests/kratix-config, directory: { recurse: true } }
  destination: { server: https://kubernetes.default.svc, namespace: kratix-platform-system }
  syncPolicy:
    automated: { selfHeal: true, prune: true }
    syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
