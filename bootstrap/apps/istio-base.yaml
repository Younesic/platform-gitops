apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-base
  namespace: argocd
  annotations: { argocd.argoproj.io/sync-wave: "1" }   # CRDs + cluster resources AVANT istiod
spec:
  project: default
  sources:
    - repoURL: https://istio-release.storage.googleapis.com/charts
      chart: base
      targetRevision: "1.30.2"
  destination: { server: https://kubernetes.default.svc, namespace: istio-system }
  syncPolicy:
    automated: { selfHeal: true, prune: false }
    syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
