# Boucle GitOps : ArgoCD lit le repo state écrit par Kratix et applique sur CE cluster.
# (Kratix écrit -> kratix-state/worker-1/{dependencies,resources} -> ArgoCD applique.)
# Wave 3 : après que GitStateStore/Destination + le secret repo ArgoCD existent (wave 2).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kratix-destination
  namespace: argocd
  annotations: { argocd.argoproj.io/sync-wave: "3" }
spec:
  project: default
  source:
    repoURL: git@github.com:Younesic/kratix-state.git
    targetRevision: main
    path: worker-1
    directory: { recurse: true, exclude: "**/.kratix/**" }
  destination: { server: https://kubernetes.default.svc, namespace: default }
  syncPolicy:
    automated: { selfHeal: true, prune: true }
    syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
