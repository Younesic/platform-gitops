# Harbor (registry OCI + Trivy) — Helm + OIDC Keycloak, même pattern app-of-apps.
# 3 sources : chart Helm + $values + manifests (DB CNPG + Client Keycloak + secrets + Job OIDC).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: harbor, namespace: argocd }
spec:
  project: default
  sources:
    - repoURL: https://helm.goharbor.io
      chart: harbor
      targetRevision: "1.19.1"
      helm:
        valueFiles: [ $values/bootstrap/values/harbor.yaml ]
    - repoURL: git@github.com:Younesic/platform-gitops.git
      targetRevision: main
      ref: values
    - repoURL: git@github.com:Younesic/platform-gitops.git
      targetRevision: main
      path: bootstrap/manifests/harbor
  destination: { server: https://kubernetes.default.svc, namespace: harbor }
  syncPolicy:
    automated: { selfHeal: true, prune: false }
    syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
