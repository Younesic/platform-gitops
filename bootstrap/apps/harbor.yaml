# Harbor (registry OCI + Trivy) — Helm + OIDC Keycloak, même pattern app-of-apps.
# 3 sources : chart Helm + $values + manifests (DB CNPG + Client Keycloak + secrets + Job OIDC).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: harbor, namespace: argocd }
spec:
  project: default
  sources:
    - repoURL: https://helm.goharbor.io
      chart: harbor
      targetRevision: "1.19.1"
      helm:
        valueFiles: [ $values/bootstrap/values/harbor.yaml ]
    - repoURL: git@github.com:Younesic/platform-gitops.git
      targetRevision: main
      ref: values
    - repoURL: git@github.com:Younesic/platform-gitops.git
      targetRevision: main
      path: bootstrap/manifests/harbor
  destination: { server: https://kubernetes.default.svc, namespace: harbor }
  # Le chart Harbor RÉGÉNÈRE ces secrets internes à chaque rendu (ArgoCD n'a pas d'accès
  # cluster pour le lookup de réutilisation) → OutOfSync perpétuel + redémarrage des pods
  # (via les annotations checksum/secret*). On FIGE le vivant : ignorer le /data de ces
  # secrets + les annotations checksum/secret* des deployments ; RespectIgnoreDifferences
  # empêche le selfHeal de les réécrire.
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: harbor-core
      jsonPointers: [ /data ]
    - group: ""
      kind: Secret
      name: harbor-jobservice
      jsonPointers: [ /data ]
    - group: ""
      kind: Secret
      name: harbor-registry
      jsonPointers: [ /data ]
    - group: ""
      kind: Secret
      name: harbor-registry-htpasswd
      jsonPointers: [ /data ]
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - '.spec.template.metadata.annotations."checksum/secret"'
        - '.spec.template.metadata.annotations."checksum/secret-core"'
        - '.spec.template.metadata.annotations."checksum/secret-jobservice"'
  syncPolicy:
    automated: { selfHeal: true, prune: false }
    syncOptions: [ CreateNamespace=true, ServerSideApply=true, RespectIgnoreDifferences=true ]
