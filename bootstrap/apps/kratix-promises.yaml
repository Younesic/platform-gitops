# Promises de la plateforme. Démarre avec une promise smoke-test (dependencies-only,
# sans image) qui prouve la boucle Kratix -> kratix-state -> ArgoCD -> cluster.
# Wave 3 : après l'install Kratix (wave 1) + le câblage statestore/destination (wave 2).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kratix-promises
  namespace: argocd
  annotations: { argocd.argoproj.io/sync-wave: "3" }
spec:
  project: default
  source: { repoURL: git@github.com:Younesic/platform-gitops.git, targetRevision: main, path: bootstrap/manifests/kratix-promises, directory: { recurse: true } }
  destination: { server: https://kubernetes.default.svc, namespace: kratix-platform-system }
  syncPolicy:
    automated: { selfHeal: true, prune: true }
    syncOptions: [ ServerSideApply=true ]
