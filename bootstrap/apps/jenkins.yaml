apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: jenkins, namespace: argocd }
spec:
  project: default
  sources:
    - repoURL: https://charts.jenkins.io
      chart: jenkins
      targetRevision: "5.9.29"
      helm:
        valueFiles: [ $values/bootstrap/values/jenkins.yaml ]
    - repoURL: git@github.com:Younesic/platform-gitops.git
      targetRevision: main
      ref: values
    - repoURL: git@github.com:Younesic/platform-gitops.git
      targetRevision: main
      path: bootstrap/manifests/jenkins
  destination: { server: https://kubernetes.default.svc, namespace: jenkins }
  syncPolicy:
    automated: { selfHeal: true, prune: false }
    syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
