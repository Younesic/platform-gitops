# App-of-apps : Kyverno (policy engine) — BR4 visibilité des enfants d'opérateur.
# Périmètre POC : admission-controller (mutation à l'admission) + reports-controller
# (PolicyReports) ; background/cleanup DÉSACTIVÉS (pas de mutate-existing/generate,
# empreinte mémoire minimale — nœuds à ~60-83%). Les webhooks de ressources sont
# créés AU RUNTIME par Kyverno (pas rendus par le chart) → aucun drift ArgoCD.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations: { argocd.argoproj.io/sync-wave: "1" }   # CRDs AVANT les policies (wave 2)
spec:
  project: default
  source:
    repoURL: https://kyverno.github.io/kyverno
    chart: kyverno
    targetRevision: "3.8.2"   # app v1.18.2
    helm:
      valuesObject:
        admissionController:
          replicas: 1
          container:
            resources:
              requests: { cpu: 50m, memory: 128Mi }
              limits: { memory: 512Mi }
        backgroundController: { enabled: false }
        cleanupController: { enabled: false }
        reportsController:
          resources:
            requests: { cpu: 20m, memory: 64Mi }
            limits: { memory: 256Mi }
  destination: { server: https://kubernetes.default.svc, namespace: kyverno }
  syncPolicy:
    automated: { selfHeal: true, prune: true }
    syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
