apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: keycloak-stack, namespace: argocd }
spec:
  project: default
  source: { repoURL: git@github.com:Younesic/platform-gitops.git, targetRevision: main, path: bootstrap/manifests/keycloak, directory: { recurse: true } }
  destination: { server: https://kubernetes.default.svc, namespace: keycloak }
  syncPolicy:
    automated: { selfHeal: true, prune: false }
    syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
