# Crossplane core — Helm (crossplane-stable/crossplane). Resources + priorityClass.
replicas: 1
priorityClassName: platform-high

resourcesCrossplane:
  requests: { cpu: 100m, memory: 256Mi }
  limits:   { cpu: 500m, memory: 512Mi }

resourcesRBACManager:
  requests: { cpu: 50m, memory: 128Mi }
  limits:   { cpu: 250m, memory: 256Mi }

# Les providers (ex. provider-keycloak) sont installés séparément en tant que CR Provider
# (phase d'adoption identity-as-code), pas en pré-chargement ici.
provider:
  packages: []
