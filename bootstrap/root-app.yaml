# Root "app-of-apps" — bootstrap de la plateforme. À appliquer une fois (le seed).
# Réconcilie toutes les Applications enfants de bootstrap/apps/.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: bootstrap, namespace: argocd }
spec:
  project: default
  source: { repoURL: git@github.com:Younesic/platform-gitops.git, targetRevision: main, path: bootstrap/apps, directory: { recurse: true } }
  destination: { server: https://kubernetes.default.svc, namespace: argocd }
  syncPolicy:
    automated: { selfHeal: true, prune: true }
    syncOptions: [ ServerSideApply=true ]
