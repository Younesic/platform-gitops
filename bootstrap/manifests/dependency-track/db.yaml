# PostgreSQL CloudNativePG pour Dependency-Track.
# Secret auto `dependency-track-db-app` (username/password) + service `dependency-track-db-rw`.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata: { name: dependency-track-db, namespace: dependency-track }
spec:
  instances: 1
  priorityClassName: platform-high
  storage: { storageClass: sbs-default, size: 10Gi }
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: "1", memory: 1Gi }
  bootstrap:
    initdb: { database: dependencytrack, owner: dependencytrack }
