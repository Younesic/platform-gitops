# OpenLDAP (simule l'AD du client). DIT seedé via le ConfigMap LDIF (1er boot).
# Image osixia : 2 gotchas gérés → initContainer copie le LDIF (ConfigMap RO) dans un emptyDir,
# et LDAP_REMOVE_CONFIG_AFTER_SETUP=false (sinon osixia rm le dossier monté → crash).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openldap
  namespace: ldap
  labels: { app: openldap }
spec:
  replicas: 1
  selector: { matchLabels: { app: openldap } }
  template:
    metadata: { labels: { app: openldap } }
    spec:
      priorityClassName: platform-high
      initContainers:
        - name: copy-ldif
          image: busybox:1.36
          command: ["sh","-c","cp /src/*.ldif /dst/ && ls -la /dst"]
          volumeMounts:
            - { name: bootstrap-src, mountPath: /src }
            - { name: bootstrap, mountPath: /dst }
      containers:
        - name: openldap
          image: osixia/openldap:1.5.0
          args: ["--loglevel","info"]
          env:
            - { name: LDAP_ORGANISATION, value: "Platform Corp" }
            - { name: LDAP_DOMAIN, value: "platform.local" }
            - { name: LDAP_REMOVE_CONFIG_AFTER_SETUP, value: "false" }
            - name: LDAP_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: openldap-admin, key: adminpassword } }
          ports:
            - { containerPort: 389, name: ldap }
            - { containerPort: 636, name: ldaps }
          volumeMounts:
            - { name: bootstrap, mountPath: /container/service/slapd/assets/config/bootstrap/ldif/custom }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 256Mi }
      volumes:
        - { name: bootstrap-src, configMap: { name: openldap-bootstrap } }
        - { name: bootstrap, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: openldap
  namespace: ldap
spec:
  selector: { app: openldap }
  ports:
    - { name: ldap, port: 389, targetPort: 389 }
    - { name: ldaps, port: 636, targetPort: 636 }
