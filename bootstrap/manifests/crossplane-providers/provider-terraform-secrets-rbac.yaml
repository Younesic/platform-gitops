# RBAC par-claim des connection secrets (option a) — droits de la SA provider-terraform
# dans le ns default : le module keycloak-user (≥ v0.7.2) rend, DANS le même Workspace,
# un Role+RoleBinding `resourceNames` EXACT (`kc-user-<claim>-creds`) pour la squad
# identity → un membre identity lit CE secret et lui seul avec son login OIDC.
#
# - roles/rolebindings : CRUD (le module les crée/détruit avec le claim — state terraform).
# - secrets get/list : EXIGÉ par la règle k8s ANTI-ESCALADE — on ne peut créer un Role
#   accordant `get` sur un secret que si on détient soi-même ce droit. Scopé au ns
#   default UNIQUEMENT (pas de ClusterRole).
# ⚠️ default contient aussi des secrets sensibles (deploy keys) : cette SA est un
#   composant plateforme (elle lit déjà les creds providers) — acceptable ; les HUMAINS
#   eux ne reçoivent que le resourceNames exact.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: provider-terraform-secrets-rbac
  namespace: default
rules:
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: provider-terraform-secrets-rbac
  namespace: default
subjects:
  - kind: ServiceAccount
    name: provider-terraform
    namespace: crossplane-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: provider-terraform-secrets-rbac
