apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    # Staging : certificats fonctionnels mais non approuvés navigateur (pas de rate-limit sur nip.io).
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@scw.cloud
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
