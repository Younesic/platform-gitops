apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Prod = certificat publiquement approuvé (requis pour l'OIDC apiserver Kapsule).
    # ⚠ nip.io est un domaine partagé → risque de rate-limit Let's Encrypt.
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@scw.cloud
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
