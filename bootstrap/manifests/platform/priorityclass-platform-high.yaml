apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: platform-high
# Priorité élevée pour les briques d'infra plateforme (ingress, cert-manager, CNPG, Keycloak).
# Garantit l'ordonnancement et la non-éviction face aux futurs workloads applicatifs.
value: 1000000
globalDefault: false
description: "Platform infrastructure components (ingress-nginx, cert-manager, CloudNativePG, Keycloak)."
