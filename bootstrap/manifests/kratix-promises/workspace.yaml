apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  labels:
    kratix.io/promise-version: v0.0.1
  name: workspace
  annotations:
    # V5 status-schema HELM (dérivé d'un outputs.schema.json du chart par la factory —
    # kratix-new-helm-promise.outputs_to_status_schema, prouvé unit). Champs de status RÉELS
    # des objets provisionnés (Namespace.status.phase, ResourceQuota.status.used). Propagé
    # sur la fiche par bc → picker de sorties LABELLISÉ (parité crossplane, MÊME tuyauterie).
    platform.kratix.io/status-schema: '{"namespacePhase": {"path": ".status.phase", "label": "État du namespace", "type": "string", "kind": "Namespace"}, "quotaUsed": {"path": ".status.used", "label": "Quota utilisé", "type": "object", "kind": "ResourceQuota"}}'
    # KS2 — lignée provider EXPLICITE (véridique : workspace est un produit team-platform ;
    # provider_owner('platform') = l'owner par défaut → ZÉRO changement d'ownership).
    # Propagée sur fiche+Template par le passthrough bc platform.kratix.io/* → facette
    # provider du Studio/marketplace. Même playbook que V4-1/SL0/G3 (annotation GitOps
    # + manual-reconciliation, zéro rebuild).
    platform.kratix.io/provider: platform
    # KS3 — logo produit (même hôte que G3 : Harbor self-hosted, allowlisté CSP img-src
    # + kratixMarketplace.logo.allowedHosts) → rendu palette/cartes Studio + marketplace.
    platform.kratix.io/logo-url: https://harbor.212-47-226-56.nip.io/favicon.ico
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: workspaces.platform.example.io
    spec:
      group: platform.example.io
      names:
        kind: Workspace
        plural: workspaces
        singular: workspace
      scope: Namespaced
      versions:
      - name: v1alpha1
        schema:
          openAPIV3Schema:
            properties:
              spec:
                properties:
                  environment:
                    description: Environnement cible
                    enum:
                    - dev
                    - staging
                    - prod
                    type: string
                  mesh:
                    description: Activer la mesh Istio sur le namespace
                    properties:
                      enabled:
                        type: boolean
                      mtls:
                        default: STRICT
                        enum:
                        - STRICT
                        - PERMISSIVE
                        type: string
                    type: object
                  team:
                    pattern: ^[a-z][a-z0-9-]*$
                    type: string
                  tier:
                    default: standard
                    enum:
                    - small
                    - standard
                    - large
                    - restricted
                    type: string
                required:
                - team
                - environment
                type: object
            type: object
        served: true
        storage: true
  destinationSelectors:
  - matchLabels:
      environment: platform
  workflows:
    config: {}
    promise:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: promise-configure
        spec:
          containers:
          - image: harbor.212-47-226-56.nip.io/platform/backstage-component@sha256:66c36af3978a719a4162a4f368da285e44de93f888fab6ea2315421cc84d18ac
            name: backstage
    resource:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: instance-configure
        spec:
          containers:
          - env:
            - name: CHART_URL
              value: oci://harbor.212-47-226-56.nip.io/platform/workspace
            - name: CHART_VERSION
              value: 0.2.2
            image: ghcr.io/syntasso/kratix-cli/helm-resource-configure:v0.2.0
            name: instance-configure
          - image: harbor.212-47-226-56.nip.io/platform/backstage-component@sha256:66c36af3978a719a4162a4f368da285e44de93f888fab6ea2315421cc84d18ac
            name: backstage
          jobOptions: {}
          rbac: {}
status:
  workflows: 0
  workflowsFailed: 0
  workflowsSucceeded: 0
