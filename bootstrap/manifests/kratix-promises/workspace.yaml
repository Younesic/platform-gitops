apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  creationTimestamp: null
  labels:
    kratix.io/promise-version: v0.0.1
  name: workspace
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: workspaces.platform.example.io
    spec:
      group: platform.example.io
      names:
        kind: Workspace
        plural: workspaces
        singular: workspace
      scope: Namespaced
      versions:
        - name: v1alpha1
          schema:
            openAPIV3Schema:
              properties:
                spec:
                  properties:
                    environment:
                      description: Environnement cible
                      enum:
                        - dev
                        - staging
                        - prod
                      type: string
                    team:
                      pattern: ^[a-z][a-z0-9-]*$
                      type: string
                    tier:
                      default: standard
                      enum:
                        - small
                        - standard
                        - large
                        - restricted
                      type: string
                  required:
                    - team
                    - environment
                  type: object
              type: object
          served: true
          storage: true
  destinationSelectors:
    - matchLabels:
        environment: platform
  workflows:
    config: {}
    promise: {}
    resource:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: instance-configure
          spec:
            containers:
              - env:
                  - name: CHART_URL
                    value: oci://harbor.212-47-226-56.nip.io/platform/workspace
                  - name: CHART_VERSION
                    value: 0.1.0
                image: ghcr.io/syntasso/kratix-cli/helm-resource-configure:v0.2.0
                name: instance-configure
status:
  workflows: 0
  workflowsFailed: 0
  workflowsSucceeded: 0
