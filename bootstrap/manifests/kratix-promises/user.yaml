apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  labels:
    kratix.io/promise-version: v0.0.1
  name: user
  annotations:
    # CT3 (loi 6 / H0 encapsulation) — `realm` n'a qu'UNE valeur valide (platform) :
    # masqué au formulaire, le défaut du schéma le matérialise dans le claim.
    # PILOTE sur manifeste GÉNÉRÉ — durable = spec.uiSchema au claim (PR portal-templates).
    backstage.example.io/ui-schema: '{"properties":{"realm":{"ui:widget":"hidden"}}}'
    platform.kratix.io/status-schema: "{\"userId\": {\"path\": \".status.userId\"\
      , \"label\": \"UUID Keycloak de l'utilisateur cr\xE9\xE9 (output Terraform).\"\
      , \"type\": \"string\"}, \"username\": {\"path\": \".status.username\", \"label\"\
      : \"Nom d'utilisateur cr\xE9\xE9 (echo).\", \"type\": \"string\"}}"
    platform.kratix.io/logo-url: data:image/webp;base64,
    platform.kratix.io/provider: identity
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: users.platform.example.io
    spec:
      group: platform.example.io
      names:
        kind: User
        plural: users
        singular: user
      scope: Namespaced
      versions:
      - name: v1alpha1
        schema:
          openAPIV3Schema:
            properties:
              spec:
                properties:
                  email:
                    description: Adresse email de l'utilisateur.
                    type: string
                  firstName:
                    description: "Pr\xE9nom."
                    type: string
                  lastName:
                    description: Nom.
                    type: string
                  realm:
                    default: platform
                    description: "Realm Keycloak o\xF9 cr\xE9er l'utilisateur."
                    type: string
                  team:
                    description: "Squad propri\xE9taire de l'instance (gouvernance)\
                      \ \u2014 auto-d\xE9riv\xE9e de l'identit\xE9 du demandeur au\
                      \ portail (RequesterTeamPicker, O5). Sans elle, la fiche retombait\
                      \ sur team-platform (r\xE9f\xE9rence pendante)."
                    type: string
                  techLead:
                    default: false
                    description: "Si true, pose l'attribut Keycloak `tech-lead=true`\
                      \ sur l'utilisateur (l'autorise \xE0 Create Group / Onboard\
                      \ Squad depuis le portail)."
                    type: boolean
                  username:
                    description: Nom d'utilisateur Keycloak (unique dans le realm).
                    maxLength: 63
                    pattern: ^[a-z0-9][a-z0-9._-]*$
                    type: string
                required:
                - username
                type: object
              status:
                properties:
                  userId:
                    description: "UUID Keycloak de l'utilisateur cr\xE9\xE9 (output\
                      \ Terraform)."
                    type: string
                  username:
                    description: "Nom d'utilisateur cr\xE9\xE9 (echo)."
                    type: string
                type: object
            type: object
        served: true
        storage: true
    status:
      acceptedNames:
        kind: ''
        plural: ''
      conditions: null
      storedVersions: null
  dependencies:
  - apiVersion: apiextensions.crossplane.io/v1
    kind: Composition
    metadata:
      name: xkeycloakuser-terraform
    spec:
      compositeTypeRef:
        apiVersion: crossplane.platform.example.io/v1alpha1
        kind: XKeycloakUser
      mode: Pipeline
      pipeline:
      - functionRef:
          name: function-patch-and-transform
        input:
          apiVersion: pt.fn.crossplane.io/v1beta1
          kind: Resources
          resources:
          - base:
              apiVersion: tf.m.upbound.io/v1beta1
              kind: Workspace
              spec:
                forProvider:
                  inlineFormat: HCL
                  module: "variable \"username\" {\n  type = string\n}\nvariable \"\
                    email\" {\n  type    = string\n  default = \"\"\n}\nvariable \"\
                    first_name\" {\n  type    = string\n  default = \"\"\n}\nvariable\
                    \ \"last_name\" {\n  type    = string\n  default = \"\"\n}\nvariable\
                    \ \"realm\" {\n  type    = string\n  default = \"platform\"\n\
                    }\nvariable \"tech_lead\" {\n  type    = bool\n  default = false\n\
                    }\nvariable \"claim_name\" {\n  type    = string\n  default =\
                    \ \"\"\n}\nvariable \"reader_group\" {\n  type    = string\n \
                    \ default = \"team-identity\"\n}\n\nresource \"random_password\"\
                    \ \"pw\" {\n  length           = 20\n  special          = true\n\
                    \  override_special = \"!@#%*-_=+\"\n}\n\nresource \"keycloak_user\"\
                    \ \"this\" {\n  realm_id   = var.realm\n  username   = var.username\n\
                    \  email      = var.email != \"\" ? var.email : null\n  first_name\
                    \ = var.first_name\n  last_name  = var.last_name\n  enabled  \
                    \  = true\n  attributes = var.tech_lead ? { \"tech-lead\" = \"\
                    true\" } : {}\n\n  initial_password {\n    value     = random_password.pw.result\n\
                    \    temporary = true\n  }\n}\n\n# RBAC par-claim (option a) :\
                    \ la squad identity lit LE connection\n# secret de CE claim (resourceNames\
                    \ EXACT) avec son login OIDC \u2014\n# z\xE9ro admin dans la boucle.\
                    \ D\xE9truits avec le claim (state).\nresource \"kubernetes_role\"\
                    \ \"reader\" {\n  metadata {\n    name      = \"kc-user-${var.claim_name}-reader\"\
                    \n    namespace = \"default\"\n  }\n  rule {\n    api_groups \
                    \    = [\"\"]\n    resources      = [\"secrets\"]\n    resource_names\
                    \ = [\"kc-user-${var.claim_name}-creds\"]\n    verbs         \
                    \ = [\"get\"]\n  }\n}\n\nresource \"kubernetes_role_binding\"\
                    \ \"reader\" {\n  metadata {\n    name      = \"kc-user-${var.claim_name}-reader\"\
                    \n    namespace = \"default\"\n  }\n  role_ref {\n    api_group\
                    \ = \"rbac.authorization.k8s.io\"\n    kind      = \"Role\"\n\
                    \    name      = kubernetes_role.reader.metadata[0].name\n  }\n\
                    \  # jumeau prefixe \"-\" : l'apiserver Kapsule PREFIXE les groupes\n\
                    \  # OIDC \u2014 binder les DEUX variantes (gotcha plateforme).\n\
                    \  subject {\n    api_group = \"rbac.authorization.k8s.io\"\n\
                    \    kind      = \"Group\"\n    name      = var.reader_group\n\
                    \  }\n  subject {\n    api_group = \"rbac.authorization.k8s.io\"\
                    \n    kind      = \"Group\"\n    name      = \"-${var.reader_group}\"\
                    \n  }\n}\n\noutput \"user_id\"  { value = keycloak_user.this.id\
                    \ }\noutput \"username\" { value = keycloak_user.this.username\
                    \ }\noutput \"password\" {\n  value     = random_password.pw.result\n\
                    \  sensitive = true\n}\n"
                  source: Inline
                  varmap:
                    claim_name: ''
                    email: ''
                    first_name: ''
                    last_name: ''
                    reader_group: team-identity
                    realm: platform
                    tech_lead: false
                    username: ''
                providerConfigRef:
                  kind: ClusterProviderConfig
                  name: keycloak
                writeConnectionSecretToRef:
                  name: kc-user-creds
            name: workspace
            patches:
            - fromFieldPath: metadata.name
              toFieldPath: metadata.name
              transforms:
              - string:
                  fmt: kc-user-%s
                  type: Format
                type: string
              type: FromCompositeFieldPath
            - fromFieldPath: metadata.name
              toFieldPath: metadata.labels['backstage.io/kubernetes-id']
              type: FromCompositeFieldPath
            - fromFieldPath: metadata.name
              toFieldPath: spec.writeConnectionSecretToRef.name
              transforms:
              - string:
                  fmt: kc-user-%s-creds
                  type: Format
                type: string
              type: FromCompositeFieldPath
            - fromFieldPath: metadata.name
              toFieldPath: spec.forProvider.varmap.claim_name
              type: FromCompositeFieldPath
            - fromFieldPath: spec.username
              toFieldPath: spec.forProvider.varmap.username
              type: FromCompositeFieldPath
            - fromFieldPath: spec.email
              policy:
                fromFieldPath: Optional
              toFieldPath: spec.forProvider.varmap.email
              type: FromCompositeFieldPath
            - fromFieldPath: spec.firstName
              policy:
                fromFieldPath: Optional
              toFieldPath: spec.forProvider.varmap.first_name
              type: FromCompositeFieldPath
            - fromFieldPath: spec.lastName
              policy:
                fromFieldPath: Optional
              toFieldPath: spec.forProvider.varmap.last_name
              type: FromCompositeFieldPath
            - fromFieldPath: spec.realm
              toFieldPath: spec.forProvider.varmap.realm
              type: FromCompositeFieldPath
            - fromFieldPath: spec.techLead
              policy:
                fromFieldPath: Optional
              toFieldPath: spec.forProvider.varmap.tech_lead
              type: FromCompositeFieldPath
            - fromFieldPath: status.atProvider.outputs.user_id
              policy:
                fromFieldPath: Optional
              toFieldPath: status.userId
              type: ToCompositeFieldPath
            - fromFieldPath: status.atProvider.outputs.username
              policy:
                fromFieldPath: Optional
              toFieldPath: status.username
              type: ToCompositeFieldPath
        step: patch-and-transform
  - apiVersion: apiextensions.crossplane.io/v2
    kind: CompositeResourceDefinition
    metadata:
      name: xkeycloakusers.crossplane.platform.example.io
    spec:
      group: crossplane.platform.example.io
      names:
        kind: XKeycloakUser
        plural: xkeycloakusers
      scope: Namespaced
      versions:
      - name: v1alpha1
        referenceable: true
        schema:
          openAPIV3Schema:
            properties:
              spec:
                properties:
                  email:
                    description: Adresse email de l'utilisateur.
                    type: string
                  firstName:
                    description: "Pr\xE9nom."
                    type: string
                  lastName:
                    description: Nom.
                    type: string
                  realm:
                    default: platform
                    description: "Realm Keycloak o\xF9 cr\xE9er l'utilisateur."
                    type: string
                  team:
                    description: "Squad propri\xE9taire de l'instance (gouvernance)\
                      \ \u2014 auto-d\xE9riv\xE9e de l'identit\xE9 du demandeur au\
                      \ portail (RequesterTeamPicker, O5). Sans elle, la fiche retombait\
                      \ sur team-platform (r\xE9f\xE9rence pendante)."
                    type: string
                  techLead:
                    default: false
                    description: "Si true, pose l'attribut Keycloak `tech-lead=true`\
                      \ sur l'utilisateur (l'autorise \xE0 Create Group / Onboard\
                      \ Squad depuis le portail)."
                    type: boolean
                  username:
                    description: Nom d'utilisateur Keycloak (unique dans le realm).
                    maxLength: 63
                    pattern: ^[a-z0-9][a-z0-9._-]*$
                    type: string
                required:
                - username
                type: object
              status:
                properties:
                  userId:
                    description: "UUID Keycloak de l'utilisateur cr\xE9\xE9 (output\
                      \ Terraform)."
                    type: string
                  username:
                    description: "Nom d'utilisateur cr\xE9\xE9 (echo)."
                    type: string
                type: object
            type: object
        served: true
  destinationSelectors:
  - matchLabels:
      environment: platform
  workflows:
    config: {}
    promise:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: promise-configure
        spec:
          containers:
          - image: harbor.212-47-226-56.nip.io/platform/backstage-component@sha256:6895ecfcd0b302dac0c620453554f66def5bb014e6ac0211044cab888f9a60df
            name: backstage
            env:
            - name: CURATION_REV
              value: d3ddd4184f85
    resource:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: instance-configure
        spec:
          containers:
          - env:
            - name: XRD_GROUP
              value: crossplane.platform.example.io
            - name: XRD_VERSION
              value: v1alpha1
            - name: XRD_KIND
              value: XKeycloakUser
            image: ghcr.io/syntasso/kratix-cli/from-api-to-crossplane-claim:v0.2.2
            name: from-api-to-crossplane-claim
          - image: harbor.212-47-226-56.nip.io/platform/backstage-component@sha256:6895ecfcd0b302dac0c620453554f66def5bb014e6ac0211044cab888f9a60df
            name: backstage
          jobOptions: {}
          rbac: {}
status:
  workflows: 0
  workflowsFailed: 0
  workflowsSucceeded: 0
