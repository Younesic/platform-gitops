apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  labels:
    kratix.io/promise-version: v0.0.1
  name: database
  annotations:
    platform.kratix.io/provider: platform
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: databases.platform.example.io
    spec:
      group: platform.example.io
      names:
        kind: Database
        plural: databases
        singular: database
      scope: Namespaced
      versions:
      - name: v1alpha1
        schema:
          openAPIV3Schema:
            properties:
              spec:
                properties:
                  environment:
                    description: Environnement cible
                    enum:
                    - dev
                    - staging
                    - prod
                    type: string
                  mesh:
                    description: Activer la mesh Istio sur le namespace
                    properties:
                      enabled:
                        type: boolean
                      mtls:
                        default: STRICT
                        enum:
                        - STRICT
                        - PERMISSIVE
                        type: string
                    type: object
                  team:
                    pattern: ^[a-z][a-z0-9-]*$
                    type: string
                  tier:
                    default: standard
                    enum:
                    - small
                    - standard
                    - large
                    - restricted
                    type: string
                required:
                - team
                - environment
                type: object
            type: object
        served: true
        storage: true
  destinationSelectors:
  - matchLabels:
      fleet: apps
  workflows:
    config: {}
    promise:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: promise-configure
        spec:
          containers:
          - image: harbor.212-47-226-56.nip.io/platform/backstage-component@sha256:6895ecfcd0b302dac0c620453554f66def5bb014e6ac0211044cab888f9a60df
            name: backstage
            env:
            - name: CURATION_REV
              value: c4cd9c3d0bbe
    resource:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: instance-configure
        spec:
          containers:
          - env:
            - name: CHART_URL
              value: oci://harbor.212-47-226-56.nip.io/platform/workspace
            - name: CHART_VERSION
              value: 0.2.1
            image: ghcr.io/syntasso/kratix-cli/helm-resource-configure:v0.2.0
            name: instance-configure
          - image: harbor.212-47-226-56.nip.io/platform/backstage-component@sha256:6895ecfcd0b302dac0c620453554f66def5bb014e6ac0211044cab888f9a60df
            name: backstage
          jobOptions: {}
          rbac: {}
status:
  workflows: 0
  workflowsFailed: 0
  workflowsSucceeded: 0
