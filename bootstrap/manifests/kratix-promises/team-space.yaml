apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  labels:
    kratix.io/promise-version: v0.0.1
  name: team-space
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: teamspaces.platform.example.io
    spec:
      group: platform.example.io
      names:
        kind: TeamSpace
        plural: teamspaces
        singular: teamspace
      scope: Namespaced
      versions:
      - name: v1alpha1
        schema:
          openAPIV3Schema:
            properties:
              spec:
                properties:
                  environment:
                    description: Environnement cible
                    enum:
                    - dev
                    - staging
                    - prod
                    type: string
                  mesh:
                    description: Activer la mesh Istio sur le namespace
                    properties:
                      enabled:
                        type: boolean
                      mtls:
                        default: STRICT
                        enum:
                        - STRICT
                        - PERMISSIVE
                        type: string
                    type: object
                  message:
                    default: hello from the promise-factory
                    description: "Message \xE9crit dans le ConfigMap compos\xE9."
                    maxLength: 200
                    type: string
                  team:
                    pattern: ^[a-z][a-z0-9-]*$
                    type: string
                  tier:
                    default: standard
                    enum:
                    - small
                    - standard
                    - large
                    - restricted
                    type: string
                required:
                - environment
                - team
                type: object
            type: object
        served: true
        storage: true
  destinationSelectors:
  - matchLabels:
      environment: platform
  requiredPromises:
  - name: sandbox
    version: v0.0.1
  - name: workspace
    version: v0.0.1
  workflows:
    config: {}
    promise:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: promise-configure
        spec:
          containers:
          - image: harbor.212-47-226-56.nip.io/platform/backstage-component@sha256:e5049df55881ae6d59bd53bb89e40fd75360d99b96d0f33d5e593a6dd20cfc8f
            name: backstage
    resource:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: instance-configure
        spec:
          containers:
          - image: harbor.212-47-226-56.nip.io/platform/compound-renderer@sha256:ba61685851365eb24db7967dbdeb9d500f7db16a0e57568ef1cbcff259f4baf3
            name: compound-renderer
            env:
            - name: COMPOUND_RECIPE
              value: "api:\n  type: object\n  properties:\n    message:\n      default:\
                \ hello from the promise-factory\n      description: Message \xE9\
                crit dans le ConfigMap compos\xE9.\n      maxLength: 200\n      type:\
                \ string\n    environment:\n      description: Environnement cible\n\
                \      enum:\n      - dev\n      - staging\n      - prod\n      type:\
                \ string\n    mesh:\n      description: Activer la mesh Istio sur\
                \ le namespace\n      properties:\n        enabled:\n          type:\
                \ boolean\n        mtls:\n          default: STRICT\n          enum:\n\
                \          - STRICT\n          - PERMISSIVE\n          type: string\n\
                \      type: object\n    team:\n      pattern: ^[a-z][a-z0-9-]*$\n\
                \      type: string\n    tier:\n      default: standard\n      enum:\n\
                \      - small\n      - standard\n      - large\n      - restricted\n\
                \      type: string\n  required:\n  - environment\n  - team\nchildren:\n\
                - name: sandbox\n  promise: sandbox\n  version: v0.0.1\n  apiVersion:\
                \ platform.example.io/v1alpha1\n  kind: Sandbox\n  spec:\n    message:\
                \ ${spec.message}\n  when:\n    field: spec.message\n    exists: true\n\
                - name: workspace\n  promise: workspace\n  version: v0.0.1\n  apiVersion:\
                \ platform.example.io/v1alpha1\n  kind: Workspace\n  spec:\n    environment:\
                \ ${spec.environment}\n    mesh: ${spec.mesh}\n    team: ${spec.team}\n\
                \    tier: ${spec.tier}\n  when:\n    field: spec.environment\n  \
                \  equals: dev\n  needs:\n  - sandbox\n"
            - name: COMPOUND_STAGE
              value: emit
          - image: harbor.212-47-226-56.nip.io/platform/backstage-component@sha256:e5049df55881ae6d59bd53bb89e40fd75360d99b96d0f33d5e593a6dd20cfc8f
            name: backstage
          jobOptions: {}
          rbac: {}
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: gated-1
        spec:
          containers:
          - image: harbor.212-47-226-56.nip.io/platform/compound-renderer@sha256:ba61685851365eb24db7967dbdeb9d500f7db16a0e57568ef1cbcff259f4baf3
            name: compound-renderer
            env:
            - name: COMPOUND_RECIPE
              value: "api:\n  type: object\n  properties:\n    message:\n      default:\
                \ hello from the promise-factory\n      description: Message \xE9\
                crit dans le ConfigMap compos\xE9.\n      maxLength: 200\n      type:\
                \ string\n    environment:\n      description: Environnement cible\n\
                \      enum:\n      - dev\n      - staging\n      - prod\n      type:\
                \ string\n    mesh:\n      description: Activer la mesh Istio sur\
                \ le namespace\n      properties:\n        enabled:\n          type:\
                \ boolean\n        mtls:\n          default: STRICT\n          enum:\n\
                \          - STRICT\n          - PERMISSIVE\n          type: string\n\
                \      type: object\n    team:\n      pattern: ^[a-z][a-z0-9-]*$\n\
                \      type: string\n    tier:\n      default: standard\n      enum:\n\
                \      - small\n      - standard\n      - large\n      - restricted\n\
                \      type: string\n  required:\n  - environment\n  - team\nchildren:\n\
                - name: sandbox\n  promise: sandbox\n  version: v0.0.1\n  apiVersion:\
                \ platform.example.io/v1alpha1\n  kind: Sandbox\n  spec:\n    message:\
                \ ${spec.message}\n  when:\n    field: spec.message\n    exists: true\n\
                - name: workspace\n  promise: workspace\n  version: v0.0.1\n  apiVersion:\
                \ platform.example.io/v1alpha1\n  kind: Workspace\n  spec:\n    environment:\
                \ ${spec.environment}\n    mesh: ${spec.mesh}\n    team: ${spec.team}\n\
                \    tier: ${spec.tier}\n  when:\n    field: spec.environment\n  \
                \  equals: dev\n  needs:\n  - sandbox\n"
            - name: COMPOUND_STAGE
              value: gated
            - name: COMPOUND_DEPTH
              value: '1'
          jobOptions: {}
          rbac:
            permissions:
            - resourceNamespace: '*'
              apiGroups:
              - platform.example.io
              resources:
              - '*'
              verbs:
              - get
              - list
status:
  workflows: 0
  workflowsFailed: 0
  workflowsSucceeded: 0
