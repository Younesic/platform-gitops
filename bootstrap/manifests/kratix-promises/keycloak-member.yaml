apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  labels:
    kratix.io/promise-version: v0.0.1
  name: keycloak-member
  annotations:
    backstage.example.io/ui-schema: '{"properties":{"group":{"ui:field":"CatalogNamePicker","ui:options":{"catalogFilter":{"kind":"Group"}}},"users":{"ui:field":"CatalogNamePicker","ui:options":{"catalogFilter":{"kind":"User"}}}}}'
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: keycloakmembers.platform.example.io
    spec:
      group: platform.example.io
      names:
        kind: KeycloakMember
        plural: keycloakmembers
        singular: keycloakmember
      scope: Namespaced
      versions:
      - name: v1alpha1
        schema:
          openAPIV3Schema:
            properties:
              spec:
                properties:
                  group:
                    description: "Nom du groupe Keycloak g\xE9r\xE9 par la plateforme\
                      \ (ex. team-vente)."
                    maxLength: 63
                    pattern: ^[a-z][a-z0-9-]*$
                    type: string
                  realm:
                    default: platform
                    description: Realm Keycloak.
                    type: string
                  users:
                    description: "Usernames Keycloak membres du groupe \u2014 ce claim\
                      \ g\xE8re LA liste compl\xE8te (1 claim par groupe)."
                    items:
                      maxLength: 63
                      minLength: 1
                      type: string
                    minItems: 1
                    type: array
                required:
                - group
                - users
                type: object
            type: object
        served: true
        storage: true
    status:
      acceptedNames:
        kind: ''
        plural: ''
      conditions: null
      storedVersions: null
  dependencies:
  - apiVersion: apiextensions.crossplane.io/v1
    kind: Composition
    metadata:
      name: xkeycloakmember-keycloak
    spec:
      compositeTypeRef:
        apiVersion: crossplane.platform.example.io/v1alpha1
        kind: XKeycloakMember
      mode: Pipeline
      pipeline:
      - functionRef:
          name: function-patch-and-transform
        input:
          apiVersion: pt.fn.crossplane.io/v1beta1
          kind: Resources
          resources:
          - base:
              apiVersion: group.keycloak.m.crossplane.io/v1alpha1
              kind: Memberships
              spec:
                forProvider:
                  realmId: platform
                providerConfigRef:
                  kind: ClusterProviderConfig
                  name: default
            name: membership
            patches:
            - fromFieldPath: spec.group
              toFieldPath: spec.forProvider.groupIdRef.name
              transforms:
              - string:
                  fmt: kc-group-%s
                  type: Format
                type: string
              type: FromCompositeFieldPath
            - fromFieldPath: spec.users
              toFieldPath: spec.forProvider.members
              type: FromCompositeFieldPath
            - fromFieldPath: metadata.name
              toFieldPath: metadata.labels['backstage.io/kubernetes-id']
              type: FromCompositeFieldPath
            - fromFieldPath: spec.realm
              toFieldPath: spec.forProvider.realmId
              type: FromCompositeFieldPath
        step: patch-and-transform
  - apiVersion: apiextensions.crossplane.io/v2
    kind: CompositeResourceDefinition
    metadata:
      name: xkeycloakmembers.crossplane.platform.example.io
    spec:
      group: crossplane.platform.example.io
      names:
        kind: XKeycloakMember
        plural: xkeycloakmembers
      scope: Namespaced
      versions:
      - name: v1alpha1
        referenceable: true
        schema:
          openAPIV3Schema:
            properties:
              spec:
                properties:
                  group:
                    description: "Nom du groupe Keycloak g\xE9r\xE9 par la plateforme\
                      \ (ex. team-vente)."
                    maxLength: 63
                    pattern: ^[a-z][a-z0-9-]*$
                    type: string
                  realm:
                    default: platform
                    description: Realm Keycloak.
                    type: string
                  users:
                    description: "Usernames Keycloak membres du groupe \u2014 ce claim\
                      \ g\xE8re LA liste compl\xE8te (1 claim par groupe)."
                    items:
                      maxLength: 63
                      minLength: 1
                      type: string
                    minItems: 1
                    type: array
                required:
                - group
                - users
                type: object
            type: object
        served: true
  destinationSelectors:
  - matchLabels:
      environment: platform
  workflows:
    config: {}
    promise:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: promise-configure
        spec:
          containers:
          - image: harbor.212-47-226-56.nip.io/platform/backstage-component@sha256:9a2e61a1b9fa754e50ffac55a59f3a3b987c6a5fdf73055f7d70ddecedf46b27
            name: backstage
    resource:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: instance-configure
        spec:
          containers:
          - env:
            - name: XRD_GROUP
              value: crossplane.platform.example.io
            - name: XRD_VERSION
              value: v1alpha1
            - name: XRD_KIND
              value: XKeycloakMember
            image: ghcr.io/syntasso/kratix-cli/from-api-to-crossplane-claim:v0.2.2
            name: from-api-to-crossplane-claim
          - image: harbor.212-47-226-56.nip.io/platform/backstage-component@sha256:9a2e61a1b9fa754e50ffac55a59f3a3b987c6a5fdf73055f7d70ddecedf46b27
            name: backstage
          jobOptions: {}
          rbac: {}
status:
  workflows: 0
  workflowsFailed: 0
  workflowsSucceeded: 0
