# MÉTA-PROMESSE : créer une promesse devient un claim typé (helm ET crossplane
# implémentés ; terraform/operator = slots) (donc un formulaire Backstage, via le
# Template poussé par promise-configure). Le pipeline rejoue le MÊME outillage que
# le poste du platform engineer (plugins kratix new-helm-promise /
# new-crossplane-promise + schema-to-crd) et pousse une BRANCHE DE REVUE sur
# platform-gitops — jamais d'auto-apply : le merge humain reste le garde-fou de
# gouvernance. crossplane : source = repo git à une ref PINNÉE (tag|SHA) contenant
# 1 XRD + Composition(s) — la XRD est le contrat, copiée telle quelle dans l'API.
# Prérequis (manuel, comme les autres clés de repo) : Secret default/promise-factory-git
# (sshPrivateKey + knownHosts de la deploy key RW « promise-factory-write »).
apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  name: promise-factory
  labels:
    kratix.io/promise-version: v0.3.1
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: promiserequests.platform.example.io
    spec:
      group: platform.example.io
      names:
        kind: PromiseRequest
        plural: promiserequests
        singular: promiserequest
      scope: Namespaced
      versions:
        - name: v1alpha1
          served: true
          storage: true
          schema:
            openAPIV3Schema:
              type: object
              properties:
                spec:
                  type: object
                  required:
                    - kind
                    - type
                    - source
                  # validation par type (CEL) : helm et crossplane exigent source.url + source.version.
                  x-kubernetes-validations:
                    - rule: "self.type != 'helm' || (has(self.source.url) && has(self.source.version))"
                      message: "type helm : source.url et source.version sont requis (pin de gouvernance)"
                    - rule: "self.type != 'crossplane' || (has(self.source.url) && has(self.source.version))"
                      message: "type crossplane : source.url (repo git) et source.version (tag ou SHA) sont requis (pin de gouvernance)"
                  properties:
                    type:
                      type: string
                      description: Moteur de la future promesse (helm et crossplane implémentés ; terraform/operator = slots)
                      enum: [helm, crossplane, terraform, operator]
                      default: helm
                    kind:
                      type: string
                      description: Kind de l'API de la future promesse (ex. Database)
                      pattern: ^[A-Z][A-Za-z0-9]*$
                    plural:
                      type: string
                      description: "Pluriel du kind (défaut : kind minuscule + 's' — à poser si ce pluriel est faux, ex. sandboxes)"
                      pattern: ^[a-z][a-z0-9]*$
                    group:
                      type: string
                      default: platform.example.io
                      description: Groupe API de la future promesse
                    source:
                      type: object
                      description: La source d'implémentation (forme selon le type)
                      properties:
                        url:
                          type: string
                          description: "helm : chart (oci:// ou repo https://) · crossplane : repo git (https:// ou git@hôte:…) · terraform : module git::https://"
                          pattern: ^((git::)?(oci|https?)://|git@[A-Za-z0-9.-]+:).+
                        version:
                          type: string
                          description: "Pin EXACT de gouvernance — jamais latest. helm : semver du chart · crossplane : tag semver ou SHA git"
                          pattern: ^(v?[0-9]+\.[0-9]+\.[0-9]+([+-][A-Za-z0-9.-]+)?|[0-9a-f]{7,40})$
                        path:
                          type: string
                          description: "crossplane : sous-dossier du repo contenant la XRD + Composition(s) (défaut : racine)"
                        chartName:
                          type: string
                          description: Nom du chart (requis seulement pour un repo Helm non-OCI)
  destinationSelectors:
    - matchLabels:
        environment: platform
  workflows:
    config: {}
    promise:
      configure:
        # Template « PromiseRequest » poussé au portail : créer une promesse = un formulaire.
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: promise-configure
          spec:
            containers:
              - name: backstage
                image: harbor.212-47-226-56.nip.io/platform/backstage-component@sha256:94f80073cbffd08e4457f03fecfec65a4d33cf31c3f2ace279fab34faf2e9ce7
    resource:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: factory
          spec:
            volumes:
              - name: git-creds
                secret:
                  secretName: promise-factory-git
                  defaultMode: 0400
            containers:
              - name: factory
                image: harbor.212-47-226-56.nip.io/platform/promise-factory@sha256:fc7f6f52fe2d14217a707d05daa13b8e9bfadf3a3fe2d39b4afe45bc419d3155
                volumeMounts:
                  - name: git-creds
                    mountPath: /kratix/secrets/git
                    readOnly: true
