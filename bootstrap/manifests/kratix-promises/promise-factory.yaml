# MÉTA-PROMESSE : créer une promesse devient un claim typé (helm, crossplane ET
# compound implémentés ; terraform/operator = slots) (donc un formulaire Backstage,
# via le Template poussé par promise-configure). Le pipeline rejoue le MÊME outillage
# que le poste du platform engineer (plugins kratix new-helm-promise /
# new-crossplane-promise / new-compound-promise + schema-to-crd) et pousse une
# BRANCHE DE REVUE sur platform-gitops — jamais d'auto-apply : le merge humain reste
# le garde-fou de gouvernance. crossplane : source = repo git à une ref PINNÉE
# (tag|SHA) contenant 1 XRD + Composition(s) — la XRD est le contrat, copiée telle
# quelle dans l'API. compound : DEUX chemins à parité — source = repo git pinné
# contenant compound.yaml (équipes) OU **spec.recipe INLINE** (le COMPOSER du
# portail) : l'API parent se DÉRIVE des promesses enfants choisies (EntityPicker sur
# les fiches kratix-promise ; version/apiVersion/kind vides = résolus et PINNÉS à la
# génération ; curation fix/hide ; la branche de revue montre l'API dérivée).
# requiredPromises = gate ; renderer partagé : when (T2), needs/exports + waits (T3),
# sync-waves (prune ordonné). Annotations backstage.example.io/* = formulaire
# (ui-schema : EntityPicker + ui:order [l'API server ALPHABÉTISE les properties du
# CRD → l'ordre du formulaire se pilote ici] ; form-switch : affichage par type).
# ⚠️ Annotations JSON une-ligne : TOUJOURS valider json.loads avant commit (vécu).
# Prérequis (manuel, comme les autres clés de repo) : Secret default/promise-factory-git
# (sshPrivateKey + knownHosts de la deploy key RW « promise-factory-write »).
apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  name: promise-factory
  labels:
    kratix.io/promise-version: v0.7.4
  annotations:
    backstage.example.io/ui-schema: '{"ui:order":["type","kind","plural","group","source","recipe","uiSchema","*"],"properties":{"source":{"ui:order":["url","version","chartName","path"]},"recipe":{"ui:field":"CompoundComposer"},"uiSchema":{"ui:field":"LeafPresentationComposer"}}}'
    # hide par branche RÉACTIVÉ avec backstage-component ≥0.4.9 : le masquage
    # RETIRE le sous-champ du SCHÉMA de la branche (le ui:widget hidden posé
    # dans une branche était aplati globalement par rjsf — vécu, source.path
    # invisible en crossplane avec 0.4.5→0.4.8).
    backstage.example.io/form-switch: '{"field":"type","cases":{"helm":[{"field":"source","hide":["path"]}],"crossplane":[{"field":"source","hide":["chartName"]}],"terraform":["source"],"operator":["source"],"compound":["recipe"]}}'
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: promiserequests.platform.example.io
    spec:
      group: platform.example.io
      names:
        kind: PromiseRequest
        plural: promiserequests
        singular: promiserequest
      scope: Namespaced
      versions:
      - name: v1alpha1
        served: true
        storage: true
        schema:
          openAPIV3Schema:
            type: object
            properties:
              spec:
                type: object
                required:
                - kind
                - type
                # validation par type (CEL). ⚠️ source n'est plus requis globalement
                # (compound inline) → chaque règle DOIT garder has(self.source).
                x-kubernetes-validations:
                - rule: self.type != 'helm' || (has(self.source) && has(self.source.url) && has(self.source.version))
                  message: 'type helm : source.url et source.version sont requis (pin de gouvernance)'
                - rule: self.type != 'crossplane' || (has(self.source) && has(self.source.url) && has(self.source.version))
                  message: 'type crossplane : source.url (repo git) et source.version (tag ou SHA) sont requis (pin de gouvernance)'
                - rule: self.type != 'compound' || (has(self.source) && has(self.source.url) && has(self.source.version)) || (has(self.recipe) && has(self.recipe.children))
                  message: 'type compound : soit source.url+version (recette compound.yaml dans git), soit recipe inline (composer du portail)'
                properties:
                  type:
                    type: string
                    description: Moteur de la future promesse (helm, crossplane et compound implémentés ; terraform/operator = slots)
                    enum:
                    - helm
                    - crossplane
                    - terraform
                    - operator
                    - compound
                    default: helm
                  kind:
                    type: string
                    description: Kind de l'API de la future promesse (ex. Database)
                    pattern: ^[A-Z][A-Za-z0-9]*$
                  plural:
                    type: string
                    description: 'Pluriel du kind (défaut : kind minuscule + ''s'' — à poser si ce pluriel est faux, ex. sandboxes)'
                    pattern: ^[a-z][a-z0-9]*$
                  group:
                    type: string
                    default: platform.example.io
                    description: Groupe API de la future promesse
                  source:
                    type: object
                    description: La source d'implémentation (forme selon le type)
                    properties:
                      url:
                        type: string
                        description: 'helm : chart (oci:// ou repo https://) · crossplane/compound : repo git (https:// ou git@hôte:…) · terraform : module git::https://'
                        pattern: ^((git::)?(oci|https?)://|git@[A-Za-z0-9.-]+:).+
                      version:
                        type: string
                        description: 'Pin EXACT de gouvernance — jamais latest. helm : semver du chart · crossplane/compound : tag semver ou SHA git'
                        pattern: ^(v?[0-9]+\.[0-9]+\.[0-9]+([+-][A-Za-z0-9.-]+)?|[0-9a-f]{7,40})$
                      path:
                        type: string
                        description: 'crossplane : sous-dossier du repo contenant la XRD + Composition(s) · compound : sous-dossier contenant compound.yaml (défaut : racine)'
                      chartName:
                        type: string
                        description: Nom du chart (requis seulement pour un repo Helm non-OCI)
                  uiSchema:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                    description: 'Présentation du formulaire des demandeurs (pickers dynamiques par champ) — réglée À LA CRÉATION par le composer LeafPresentationComposer (champs dérivés de la source). Recopiée en annotation ui-schema sur la promesse générée. Compound : la présentation vit dans recipe.uiSchema (composer inline).'
                  recipe:
                    type: object
                    description: L'API parent se DÉRIVE des promesses choisies ; la branche de revue montre le résultat complet.
                    properties:
                      uiSchema:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                        description: 'Présentation des champs parent (ui:* par champ) — écrite par le volet « Présentation » du composer (sources découvertes au catalogue). Précédence : hérité des enfants < recipe.uiSchema < spec.uiSchema.'
                      api:
                        type: array
                        description: Optionnel — s'ajoutent aux champs dérivés des enfants.
                        items:
                          type: object
                          required:
                          - name
                          - type
                          properties:
                            name:
                              type: string
                              pattern: ^[a-zA-Z][a-zA-Z0-9]*$
                              description: Nom du champ
                            type:
                              type: string
                              enum:
                              - string
                              - boolean
                              - integer
                            title:
                              type: string
                              description: Libellé affiché dans le formulaire
                            description:
                              type: string
                            required:
                              type: boolean
                              default: false
                            enum:
                              type: array
                              items:
                                type: string
                              description: Valeurs permises (type string)
                            default:
                              type: string
                              description: 'Défaut (coercé selon type : true/false, entier, sinon texte)'
                            pattern:
                              type: string
                              description: Regex de validation (type string)
                        title: Champs parent additionnels (avancé)
                      children:
                        type: array
                        description: '1 ligne = 1 promesse enfant. Tout le reste se dérive : ne remplis que ce que tu veux ajuster.'
                        items:
                          type: object
                          required:
                          - name
                          - promise
                          properties:
                            name:
                              type: string
                              pattern: ^[a-z][a-z0-9-]*$
                              description: Le claim enfant s'appellera parent-nom.
                              title: Nom logique
                            promise:
                              type: string
                              description: Choisir l'offre au catalogue.
                              title: Promesse
                            version:
                              type: string
                              description: Vide = version installée, pinnée à la génération.
                              title: Version (avancé)
                            apiVersion:
                              type: string
                              description: Vide = résolu depuis la promesse installée.
                              title: apiVersion (avancé)
                            kind:
                              type: string
                              description: Vide = résolu depuis la promesse installée.
                              title: Kind (avancé)
                            fix:
                              type: object
                              additionalProperties:
                                type: string
                              description: champ → valeur constante ; disparaît du formulaire parent.
                              title: Figer des champs — curation
                            hide:
                              type: array
                              items:
                                type: string
                              description: Champs OPTIONNELS à retirer du parent (un requis se fige).
                              title: Masquer des champs — curation
                            spec:
                              type: object
                              additionalProperties:
                                type: string
                              description: 'Override d''un mapping auto : ${spec.x}, ${children.<nom>.<export>}, littéral.'
                              title: Mappings avancés
                            when:
                              type: array
                              maxItems: 8
                              title: Conditions d'émission (optionnel)
                              description: 'T2 : l''enfant n''est créé que si TOUTES les conditions passent (ET).'
                              items:
                                type: object
                                properties:
                                  field:
                                    type: string
                                    description: Chemin du parent (ex. spec.message)
                                  equals:
                                    type: string
                                    description: Émis si égal (true/false/entiers coercés)
                                  exists:
                                    type: boolean
                                    description: Émis si présent (true) ou absent (false)
                            whenMode:
                              type: string
                              enum:
                              - all
                              - any
                              description: "Entre plusieurs conditions : all = ET (défaut), any = OU"
                            needs:
                              type: array
                              items:
                                type: string
                              description: Noms d'enfants à attendre (readiness) avant d'émettre celui-ci.
                              title: Attendre d'abord (T3)
                            exports:
                              type: object
                              additionalProperties:
                                type: string
                              description: clé → chemin .status.… publié pour les autres enfants.
                              title: Exports (T3)
                        title: Promesses composées
                    title: Recette — le composer
  destinationSelectors:
  - matchLabels:
      environment: platform
  workflows:
    config: {}
    promise:
      configure:
      # Template « PromiseRequest » + fiche kratix-promise poussés au portail.
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: promise-configure
        spec:
          containers:
          - name: backstage
            image: harbor.212-47-226-56.nip.io/platform/backstage-component@sha256:3b26c490c30d2bc80ef063d92e142ddcd11387d2da9657c1dadbf483e32bc777
            # La MÉTA-promesse n'est PAS une offre publique : son Template + sa fiche
            # restent réservés au plan plateforme/provider (pas les consommateurs).
            env:
            - name: BACKSTAGE_PUBLIC
              value: "false"
    resource:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: factory
        spec:
          # composer inline : la factory résout version/apiVersion/kind + SCHÉMAS
          # des enfants depuis les promesses INSTALLÉES (dérivation de l'API parent).
          rbac:
            permissions:
            # promises = CLUSTER-scoped -> resourceNamespace "*" force un ClusterRole
            # (sans lui, Kratix génère un Role namespacé qui ne donne AUCUN accès — vécu)
            - resourceNamespace: "*"
              apiGroups:
              - platform.kratix.io
              resources:
              - promises
              verbs:
              - get
              - list
          volumes:
          - name: git-creds
            secret:
              secretName: promise-factory-git
              defaultMode: 256
          containers:
          - name: factory
            image: harbor.212-47-226-56.nip.io/platform/promise-factory@sha256:0289b5d434a6990add267f4d0448d7683882684007ce1cddaea7bb59c57260e5
            volumeMounts:
            - name: git-creds
              mountPath: /kratix/secrets/git
              readOnly: true
