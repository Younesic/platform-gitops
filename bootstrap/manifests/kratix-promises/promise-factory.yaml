# MÉTA-PROMESSE : créer une promesse devient un claim typé (helm implémenté ; crossplane/terraform/operator = slots) (donc un formulaire
# Backstage, via le Template poussé par promise-configure). Le pipeline rejoue le
# MÊME outillage que le poste du platform engineer (plugin kratix new-helm-promise
# + schema-to-crd) et pousse une BRANCHE DE REVUE sur platform-gitops — jamais
# d'auto-apply : le merge humain reste le garde-fou de gouvernance.
# Prérequis (manuel, comme les autres clés de repo) : Secret default/promise-factory-git
# (sshPrivateKey + knownHosts de la deploy key RW « promise-factory-write »).
apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  name: promise-factory
  labels:
    kratix.io/promise-version: v0.2.0
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: promiserequests.platform.example.io
    spec:
      group: platform.example.io
      names:
        kind: PromiseRequest
        plural: promiserequests
        singular: promiserequest
      scope: Namespaced
      versions:
        - name: v1alpha1
          served: true
          storage: true
          schema:
            openAPIV3Schema:
              type: object
              properties:
                spec:
                  type: object
                  required:
                    - kind
                    - type
                    - source
                  # validation par type (CEL) : helm exige source.url + source.version.
                  x-kubernetes-validations:
                    - rule: "self.type != 'helm' || (has(self.source.url) && has(self.source.version))"
                      message: "type helm : source.url et source.version sont requis (pin de gouvernance)"
                  properties:
                    type:
                      type: string
                      description: Moteur de la future promesse (seul helm est implémenté ; les autres sont des slots)
                      enum: [helm, crossplane, terraform, operator]
                      default: helm
                    kind:
                      type: string
                      description: Kind de l'API de la future promesse (ex. Database)
                      pattern: ^[A-Z][A-Za-z0-9]*$
                    group:
                      type: string
                      default: platform.example.io
                      description: Groupe API de la future promesse
                    source:
                      type: object
                      description: La source d'implémentation (forme selon le type)
                      properties:
                        url:
                          type: string
                          description: "helm : chart (oci:// ou repo https://) · terraform : module git::https://"
                          pattern: ^(git::)?(oci|https?)://.+
                        version:
                          type: string
                          description: Version EXACTE, semver (pin de gouvernance — jamais latest)
                          pattern: ^v?[0-9]+\.[0-9]+\.[0-9]+([+-][A-Za-z0-9.-]+)?$
                        chartName:
                          type: string
                          description: Nom du chart (requis seulement pour un repo Helm non-OCI)
  destinationSelectors:
    - matchLabels:
        environment: platform
  workflows:
    config: {}
    promise:
      configure:
        # Template « PromiseRequest » poussé au portail : créer une promesse = un formulaire.
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: promise-configure
          spec:
            containers:
              - name: backstage
                image: harbor.212-47-226-56.nip.io/platform/backstage-component@sha256:3c03775f53bfaba0afb7f49accfa63c3f7d9e4a394b72d1582aca445fb8723c4
    resource:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: factory
          spec:
            volumes:
              - name: git-creds
                secret:
                  secretName: promise-factory-git
                  defaultMode: 0400
            containers:
              - name: factory
                image: harbor.212-47-226-56.nip.io/platform/promise-factory@sha256:55fd7e064f9d32a7f2c8bbeed3635471ba35f0963c9ebdabe89635e8efffb514
                volumeMounts:
                  - name: git-creds
                    mountPath: /kratix/secrets/git
                    readOnly: true
