apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  labels:
    kratix.io/promise-version: v0.0.1
  name: sandbox
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: sandboxes.platform.example.io
    spec:
      group: platform.example.io
      names:
        kind: Sandbox
        plural: sandboxes
        singular: sandbox
      scope: Namespaced
      versions:
      - name: v1alpha1
        schema:
          openAPIV3Schema:
            properties:
              spec:
                default: {}
                properties:
                  message:
                    default: hello from the promise-factory
                    description: Message écrit dans le ConfigMap composé.
                    maxLength: 200
                    type: string
                type: object
            type: object
        served: true
        storage: true
    status:
      acceptedNames:
        kind: ""
        plural: ""
      conditions: null
      storedVersions: null
  dependencies:
  - apiVersion: apiextensions.crossplane.io/v1
    kind: Composition
    metadata:
      name: xsandbox-configmap
    spec:
      compositeTypeRef:
        apiVersion: crossplane.platform.example.io/v1alpha1
        kind: XSandbox
      mode: Pipeline
      pipeline:
      - functionRef:
          name: function-patch-and-transform
        input:
          apiVersion: pt.fn.crossplane.io/v1beta1
          kind: Resources
          resources:
          - base:
              apiVersion: v1
              data:
                owner: promise-factory-e2e
              kind: ConfigMap
            name: configmap
            patches:
            - fromFieldPath: metadata.name
              toFieldPath: metadata.name
              transforms:
              - string:
                  fmt: sandbox-%s
                  type: Format
                type: string
              type: FromCompositeFieldPath
            - fromFieldPath: spec.message
              toFieldPath: data.message
              type: FromCompositeFieldPath
            readinessChecks:
            - type: None
        step: patch-and-transform
  - apiVersion: apiextensions.crossplane.io/v2
    kind: CompositeResourceDefinition
    metadata:
      name: xsandboxes.crossplane.platform.example.io
    spec:
      group: crossplane.platform.example.io
      names:
        kind: XSandbox
        plural: xsandboxes
      scope: Namespaced
      versions:
      - name: v1alpha1
        referenceable: true
        schema:
          openAPIV3Schema:
            properties:
              spec:
                properties:
                  message:
                    default: hello from the promise-factory
                    description: Message écrit dans le ConfigMap composé.
                    maxLength: 200
                    type: string
                type: object
            type: object
        served: true
  destinationSelectors:
  - matchLabels:
      environment: platform
  workflows:
    config: {}
    promise:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: promise-configure
        spec:
          containers:
          - image: harbor.212-47-226-56.nip.io/platform/backstage-component@sha256:94f80073cbffd08e4457f03fecfec65a4d33cf31c3f2ace279fab34faf2e9ce7
            name: backstage
    resource:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: instance-configure
        spec:
          containers:
          - env:
            - name: XRD_GROUP
              value: crossplane.platform.example.io
            - name: XRD_VERSION
              value: v1alpha1
            - name: XRD_KIND
              value: XSandbox
            image: ghcr.io/syntasso/kratix-cli/from-api-to-crossplane-claim:v0.2.2
            name: from-api-to-crossplane-claim
          - image: harbor.212-47-226-56.nip.io/platform/backstage-component@sha256:94f80073cbffd08e4457f03fecfec65a4d33cf31c3f2ace279fab34faf2e9ce7
            name: backstage
          jobOptions: {}
          rbac: {}
status:
  workflows: 0
  workflowsFailed: 0
  workflowsSucceeded: 0
