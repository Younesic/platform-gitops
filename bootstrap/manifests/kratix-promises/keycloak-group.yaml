apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  labels:
    kratix.io/promise-version: v0.0.1
  name: keycloak-group
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: keycloakgroups.platform.example.io
    spec:
      group: platform.example.io
      names:
        kind: KeycloakGroup
        plural: keycloakgroups
        singular: keycloakgroup
      scope: Namespaced
      versions:
      - name: v1alpha1
        schema:
          openAPIV3Schema:
            properties:
              spec:
                properties:
                  group:
                    description: "Nom du groupe Keycloak g\xE9r\xE9 par la plateforme\
                      \ (ex. team-vente)."
                    maxLength: 63
                    pattern: ^[a-z][a-z0-9-]*$
                    type: string
                  realm:
                    default: platform
                    description: Realm Keycloak.
                    type: string
                required:
                - group
                type: object
              status:
                properties:
                  groupId:
                    description: "UUID Keycloak du groupe cr\xE9\xE9 (status.atProvider.id)."
                    type: string
                type: object
            type: object
        served: true
        storage: true
    status:
      acceptedNames:
        kind: ''
        plural: ''
      conditions: null
      storedVersions: null
  dependencies:
  - apiVersion: apiextensions.crossplane.io/v1
    kind: Composition
    metadata:
      name: xkeycloakgroup-keycloak
    spec:
      compositeTypeRef:
        apiVersion: crossplane.platform.example.io/v1alpha1
        kind: XKeycloakGroup
      mode: Pipeline
      pipeline:
      - functionRef:
          name: function-patch-and-transform
        input:
          apiVersion: pt.fn.crossplane.io/v1beta1
          kind: Resources
          resources:
          - base:
              apiVersion: group.keycloak.m.crossplane.io/v1alpha1
              kind: Group
              spec:
                forProvider:
                  realmId: platform
                providerConfigRef:
                  kind: ClusterProviderConfig
                  name: default
            name: group
            patches:
            - fromFieldPath: spec.group
              toFieldPath: metadata.name
              transforms:
              - string:
                  fmt: kc-group-%s
                  type: Format
                type: string
              type: FromCompositeFieldPath
            - fromFieldPath: spec.group
              toFieldPath: spec.forProvider.name
              type: FromCompositeFieldPath
            - fromFieldPath: metadata.name
              toFieldPath: metadata.labels['backstage.io/kubernetes-id']
              type: FromCompositeFieldPath
            - fromFieldPath: spec.realm
              toFieldPath: spec.forProvider.realmId
              type: FromCompositeFieldPath
            - fromFieldPath: status.atProvider.id
              toFieldPath: status.groupId
              type: ToCompositeFieldPath
        step: patch-and-transform
  - apiVersion: apiextensions.crossplane.io/v2
    kind: CompositeResourceDefinition
    metadata:
      name: xkeycloakgroups.crossplane.platform.example.io
    spec:
      group: crossplane.platform.example.io
      names:
        kind: XKeycloakGroup
        plural: xkeycloakgroups
      scope: Namespaced
      versions:
      - name: v1alpha1
        referenceable: true
        schema:
          openAPIV3Schema:
            properties:
              spec:
                properties:
                  group:
                    description: "Nom du groupe Keycloak g\xE9r\xE9 par la plateforme\
                      \ (ex. team-vente)."
                    maxLength: 63
                    pattern: ^[a-z][a-z0-9-]*$
                    type: string
                  realm:
                    default: platform
                    description: Realm Keycloak.
                    type: string
                required:
                - group
                type: object
              status:
                properties:
                  groupId:
                    description: "UUID Keycloak du groupe cr\xE9\xE9 (status.atProvider.id)."
                    type: string
                type: object
            type: object
        served: true
  destinationSelectors:
  - matchLabels:
      environment: platform
  workflows:
    config: {}
    promise:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: promise-configure
        spec:
          containers:
          - image: harbor.212-47-226-56.nip.io/platform/backstage-component@sha256:9a2e61a1b9fa754e50ffac55a59f3a3b987c6a5fdf73055f7d70ddecedf46b27
            name: backstage
    resource:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: instance-configure
        spec:
          containers:
          - env:
            - name: XRD_GROUP
              value: crossplane.platform.example.io
            - name: XRD_VERSION
              value: v1alpha1
            - name: XRD_KIND
              value: XKeycloakGroup
            image: ghcr.io/syntasso/kratix-cli/from-api-to-crossplane-claim:v0.2.2
            name: from-api-to-crossplane-claim
          - image: harbor.212-47-226-56.nip.io/platform/backstage-component@sha256:9a2e61a1b9fa754e50ffac55a59f3a3b987c6a5fdf73055f7d70ddecedf46b27
            name: backstage
          jobOptions: {}
          rbac: {}
status:
  workflows: 0
  workflowsFailed: 0
  workflowsSucceeded: 0
