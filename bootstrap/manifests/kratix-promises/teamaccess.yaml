                \  spec:\n    group: ${spec.group}\n    realm: ${spec.realm}\n- name:\
                \ member\n  promise: keycloak-member\n  version: v0.0.1\n  apiVersion:\
                \ platform.example.io/v1alpha1\n  kind: KeycloakMember\n  spec:\n\
                \    group: ${spec.group}\n    realm: ${spec.realm}\n    users: ${spec.users}\n\
