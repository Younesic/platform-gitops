            - resourceNamespace: '*'
              apiGroups:
              - platform.example.io
              resources:
              - '*'
              verbs:
              - get
              - list
            - resourceNamespace: '*'
              apiGroups:
              - '*'
              resources:
              - '*'
              verbs:
              - get
              - list
