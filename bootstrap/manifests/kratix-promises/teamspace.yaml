apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  labels:
    kratix.io/promise-version: v0.0.1
  name: teamspace
  annotations:
    backstage.example.io/ui-schema: '{"properties":{"users":{"ui:field":"CatalogNamePicker","ui:options":{"catalogFilter":{"kind":"User"}}}},"ui:order":["environment","mesh","team","tier","users","*"]}'
    platform.kratix.io/provider: cloud
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: teamspaces.platform.example.io
    spec:
      group: platform.example.io
      names:
        kind: TeamSpace
        plural: teamspaces
        singular: teamspace
      scope: Namespaced
      versions:
      - name: v1alpha1
        schema:
          openAPIV3Schema:
            properties:
              spec:
                properties:
                  environment:
                    description: Environnement cible
                    enum:
                    - dev
                    - staging
                    - prod
                    type: string
                  mesh:
                    description: Activer la mesh Istio sur le namespace
                    properties:
                      enabled:
                        type: boolean
                      mtls:
                        default: STRICT
                        enum:
                        - STRICT
                        - PERMISSIVE
                        type: string
                    type: object
                  team:
                    pattern: ^[a-z][a-z0-9-]*$
                    type: string
                  tier:
                    default: standard
                    enum:
                    - small
                    - standard
                    - large
                    - restricted
                    type: string
                  users:
                    description: "Usernames Keycloak membres du groupe \u2014 ce claim\
                      \ g\xE8re LA liste compl\xE8te (1 claim par groupe)."
                    items:
                      maxLength: 63
                      minLength: 1
                      type: string
                    minItems: 1
                    type: array
                required:
                - environment
                - team
                - users
                type: object
            type: object
        served: true
        storage: true
  destinationSelectors:
  - matchLabels:
      environment: platform
  requiredPromises:
  - name: workspace
    version: v0.0.1
  - name: teamaccess
    version: v0.0.1
  workflows:
    config: {}
    promise:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: promise-configure
        spec:
          containers:
          - image: harbor.212-47-226-56.nip.io/platform/backstage-component@sha256:721ee25eaf8f5f2974b0a6b1cdf83bb45c70617563d76086c031ef1687c59ce5
            name: backstage
            env:
            - name: UI_SCHEMA_REV
              value: 1e0c5ba49020
            - name: CURATION_REV
              value: 1cc1f5a4af7a
    resource:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: instance-configure
        spec:
          containers:
          - image: harbor.212-47-226-56.nip.io/platform/compound-renderer@sha256:1c02176ab0f52bed5758625fb09b80d683c10cec8706744872867f2848dd16d8
            name: compound-renderer
            env:
            - name: COMPOUND_RECIPE
              value: "api:\n  type: object\n  properties:\n    environment:\n    \
                \  description: Environnement cible\n      enum:\n      - dev\n  \
                \    - staging\n      - prod\n      type: string\n    mesh:\n    \
                \  description: Activer la mesh Istio sur le namespace\n      properties:\n\
                \        enabled:\n          type: boolean\n        mtls:\n      \
                \    default: STRICT\n          enum:\n          - STRICT\n      \
                \    - PERMISSIVE\n          type: string\n      type: object\n  \
                \  team:\n      pattern: ^[a-z][a-z0-9-]*$\n      type: string\n \
                \   tier:\n      default: standard\n      enum:\n      - small\n \
                \     - standard\n      - large\n      - restricted\n      type: string\n\
                \    users:\n      description: Usernames Keycloak membres du groupe\
                \ \u2014 ce claim g\xE8re LA liste compl\xE8te\n        (1 claim par\
                \ groupe).\n      items:\n        maxLength: 63\n        minLength:\
                \ 1\n        type: string\n      minItems: 1\n      type: array\n\
                \  required:\n  - environment\n  - team\n  - users\nchildren:\n- name:\
                \ workspace\n  promise: workspace\n  version: v0.0.1\n  apiVersion:\
                \ platform.example.io/v1alpha1\n  kind: Workspace\n  spec:\n    environment:\
                \ ${spec.environment}\n    mesh: ${spec.mesh}\n    team: ${spec.team}\n\
                \    tier: ${spec.tier}\n- name: teamaccess\n  promise: teamaccess\n\
                \  version: v0.0.1\n  apiVersion: platform.example.io/v1alpha1\n \
                \ kind: TeamAccess\n  spec:\n    group: team-${spec.team}\n    users:\
                \ ${spec.users}\n"
            - name: COMPOUND_STAGE
              value: emit
          - image: harbor.212-47-226-56.nip.io/platform/backstage-component@sha256:721ee25eaf8f5f2974b0a6b1cdf83bb45c70617563d76086c031ef1687c59ce5
            name: backstage
          jobOptions: {}
          rbac: {}
status:
  workflows: 0
  workflowsFailed: 0
  workflowsSucceeded: 0
