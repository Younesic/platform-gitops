# AUTOMATISATION customResources (demande user : « automatique et générique ») :
# le plugin kubernetes de Backstage ne fetch que les types LISTÉS en config, lue
# AU BOOT — chaque nouvelle promesse exigeait une édition manuelle + restart.
# Ce CronJob dérive la liste des CRDs des FAMILLES plateforme (une famille par
# moteur/provider, jamais une entrée par promesse), met à jour la ConfigMap
# dynamique et NE redémarre backstage QUE si la liste a changé (hash annoté sur
# le pod template ; drift ignoré par l'app ArgoCD — pattern Harbor).
# RBAC : côté fetch, backstage-readonly couvre déjà les familles par wildcard
# (platform.example.io/*, crossplane.platform.example.io/*) — une seule ligne à
# ajouter PAR NOUVELLE FAMILLE de provider, jamais par promesse.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backstage-config-sync
  namespace: backstage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backstage-config-sync
rules:
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [get, list]
  # BR3 — FAMILIES data-driven : le CronJob lit l'annotation
  # platform.kratix.io/operator-group des PROMESSES (posée par le plugin operator
  # à la génération) → plus d'édition manuelle par nouvel opérateur.
  - apiGroups: [platform.kratix.io]
    resources: [promises]
    verbs: [get, list]
  # …et vérifie que chaque famille dérivée a son bloc RBAC de fetch (alerte guidée
  # sinon) en lisant LE ClusterRole du lecteur backstage.
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [clusterroles]
    resourceNames: [backstage-readonly]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backstage-config-sync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backstage-config-sync
subjects:
  - kind: ServiceAccount
    name: backstage-config-sync
    namespace: backstage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backstage-config-sync
  namespace: backstage
rules:
  - apiGroups: ['']
    resources: [configmaps]
    resourceNames: [backstage-config-dynamic]
    verbs: [get, update, patch]
  - apiGroups: [apps]
    resources: [deployments]
    resourceNames: [backstage]
    verbs: [get, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backstage-config-sync
  namespace: backstage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backstage-config-sync
subjects:
  - kind: ServiceAccount
    name: backstage-config-sync
    namespace: backstage
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backstage-customresources-sync
  namespace: backstage
spec:
  schedule: '*/5 * * * *'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: backstage-config-sync
          restartPolicy: Never
          containers:
            - name: sync
              # alpine/k8s = kubectl + shell/coreutils (bitnami/kubectl : catalogue
              # public gelé en 2025, tag 1.35 inexistant — pull impossible, vécu)
              image: alpine/k8s:1.35.3
              resources:
                requests: { cpu: 20m, memory: 64Mi }
                limits: { cpu: 200m, memory: 192Mi }
              command: [/bin/sh, -c]
              args:
                - |
                  set -eu
                  # BR3 — FAMILIES DATA-DRIVEN : socle (familles des moteurs plateforme,
                  # stables) ∪ annotations `platform.kratix.io/operator-group` des
                  # PROMESSES (posées par le plugin operator à la génération). Un nouvel
                  # opérateur = SA promesse porte sa famille → la config live suit au
                  # tick, ZÉRO édition ici. (rabbitmq.com, ex-en-dur, vient désormais
                  # de l'annotation de la promesse `rabbit`.)
                  FAMILIES_BASE="platform.example.io crossplane.platform.example.io group.keycloak.m.crossplane.io"
                  FAMILIES_ANNOTATED=$(kubectl get promises -o jsonpath='{range .items[*]}{.metadata.annotations.platform\.kratix\.io/operator-group}{" "}{end}' 2>/dev/null || true)
                  FAMILIES=$(printf '%s\n' $FAMILIES_BASE $FAMILIES_ANNOTATED | grep -E '^[a-z0-9.-]+$' | sort -u | tr '\n' ' ')
                  echo "familles : $FAMILIES(socle: $FAMILIES_BASE / annotées: ${FAMILIES_ANNOTATED:-aucune})"
                  # alerte RBAC guidée : une famille dérivée SANS bloc de fetch dans
                  # backstage-readonly → le live montrerait des 403 ; le fix reste un
                  # merge humain (1 bloc wildcard par famille dans rbac.yaml).
                  RBAC_GROUPS=$(kubectl get clusterrole backstage-readonly -o jsonpath='{range .rules[*]}{.apiGroups[*]}{" "}{end}' 2>/dev/null || true)
                  for fam in $FAMILIES; do
                    case " $RBAC_GROUPS " in *" $fam "*) ;; *)
                      echo "⚠️  RBAC MANQUANT pour la famille '$fam' : ajouter un bloc apiGroups=[$fam] resources=['*'] verbs=[get,list,watch] à backstage-readonly (bootstrap/manifests/backstage/rbac.yaml)" ;;
                    esac
                  done
                  out=/tmp/app-config.dynamic.yaml
                  {
                    echo "# GÉNÉRÉ par le CronJob backstage-customresources-sync — ne pas éditer."
                    echo "kubernetes:"
                    echo "  customResources:"
                    echo "    - { group: rbac.authorization.k8s.io, apiVersion: v1, plural: rolebindings }"
                    echo "    - { group: security.istio.io, apiVersion: v1, plural: peerauthentications }"
                    # léger : -o name = protocole Table (le nom d'une CRD encode
                    # <plural>.<group>) — surtout PAS -o json/jsonpath global :
                    # charger toutes les CRDs avec leurs schémas = OOM (vécu à 64Mi)
                    for crd in $(kubectl get crds -o name | sed 's|.*/||'); do
                      for fam in $FAMILIES; do
                        case "$crd" in *.$fam) ;; *) continue ;; esac
                        p=${crd%.$fam}
                        # suffixe d'un groupe PLUS LONG (ex. platform.example.io
                        # matche aussi crossplane.platform.example.io) -> ignorer
                        case "$p" in *.*) continue ;; esac
                        v=$(kubectl get crd "$crd" -o jsonpath='{.spec.versions[?(@.storage==true)].name}')
                        echo "    - { group: $fam, apiVersion: $v, plural: $p }"
                      done
                    done | sort
                  } > "$out"
                  current=$(kubectl -n backstage get configmap backstage-config-dynamic -o jsonpath='{.data.app-config\.dynamic\.yaml}' 2>/dev/null || true)
                  desired=$(cat "$out")
                  if [ "$current" = "$desired" ]; then
                    echo "customResources à jour ($(grep -c 'plural:' "$out") entrées) — rien à faire."
                    exit 0
                  fi
                  kubectl -n backstage create configmap backstage-config-dynamic \
                    --from-file=app-config.dynamic.yaml="$out" --dry-run=client -o yaml \
                    | kubectl -n backstage apply -f -
                  hash=$(sha1sum "$out" | cut -c1-12)
                  kubectl -n backstage patch deployment backstage --type merge \
                    -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"dynamic-config-hash\":\"$hash\"}}}}}"
                  echo "customResources mis à jour (hash $hash) — rollout backstage déclenché."
