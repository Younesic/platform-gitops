# SL3 — Produit « Onboarder une squad » (Portal, gated tech-lead). Étape 2 du parcours :
# une squad DÉCLARÉE (SL1, sans accès) reçoit son IDENTITÉ Keycloak + son RÔLE. Template
# scaffolder natif : picker de squad déclarée (slug+membres HÉRITÉS, jamais re-tapés) + rôle
# → action kratix:onboard-squad → PR sur portal-templates {keycloak-group(+role O1) +
# keycloak-member + retrait de la fiche déclarée}. Après merge → groupe Keycloak team-<slug>
# + membres → projeté en Group (O2). Annotations : exposure product / audience portal /
# gated-by tech-lead (le MÊME gate SL2 que declare-squad).
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: onboard-squad
  title: Onboard Squad
  description: >-
    Donne à une squad DÉCLARÉE son identité Keycloak + son rôle (consumer/provider) —
    étape 2 du parcours. Réservé aux tech-leads.
  annotations:
    platform.kratix.io/exposure: product
    platform.kratix.io/audience: portal
    platform.kratix.io/gated-by: tech-lead
    # G1 — produit PLATFORM (obtenir le rôle = concern gouvernance/identité, PAS Portal) :
    # opt-in marketplace + provider platform → carte sous le provider « Platform ».
    platform.kratix.io/marketplace: "true"
    platform.kratix.io/provider: platform
  tags: [platform, squad, onboarding]
spec:
  type: portal-product
  owner: group:default/team-platform
  parameters:
    - title: Onboarding
      required: [squad, role]
      properties:
        squad:
          title: Squad déclarée
          type: string
          description: La squad à onboarder — son slug et ses membres sont HÉRITÉS de sa déclaration (non re-tapés).
          ui:field: EntityPicker
          ui:options:
            # G2 — ne cible QUE les Groups de type=squad ENCORE déclarés (status=declared) : les
            # niveaux structurels (org/dept/domain/tribe) ne s'onboardent pas, et une squad déjà
            # onboardée (option A : Group org flippé declared→onboarded) SORT du picker.
            catalogFilter:
              kind: Group
              spec.type: squad
              metadata.annotations.platform.kratix.io/squad-status: declared
        role:
          title: Rôle
          type: string
          enum: [consumer, provider]
          enumNames: ['Consumer (consomme des produits)', 'Provider (fournit + conçoit des promesses)']
          description: >-
            consumer = consomme des produits publics ; provider = fournit + peut concevoir des promesses (authoring).
  steps:
    - id: onboard
      name: Onboarder (identité Keycloak + rôle)
      action: kratix:onboard-squad
      input:
        squadRef: ${{ parameters.squad }}
        role: ${{ parameters.role }}
  output:
    links:
      - title: Pull request d'onboarding
        url: ${{ steps.onboard.output.pullRequestUrl }}
    text:
      - title: Prochaine étape
        content: >-
          Après merge : groupe Keycloak « team-${{ steps.onboard.output.slug }} » + membres +
          rôle → projeté en Group (O2). Les membres pourront consommer les produits selon leur rôle.
          La fiche déclarée est retirée (réconciliation : source unique = Keycloak).
