# G2 — Produit « Create Group » (Portal, NON-Kratix) : déclare un GROUPE d'organisation TYPÉ.
# Générique — squad n'est qu'UN type parmi {organization, department, domain, tribe, squad},
# avec hiérarchie d'ownership : organization > department > domain > tribe > squad. Chaque
# groupe est rattaché à un PARENT du niveau au-dessus (organization = racine, sans parent).
#
# Sortie = Group Backstage NATIF `<type>-<slug>` (spec.type + spec.parent → hiérarchie native
# parentOf/childOf au catalogue), poussé en PR sur portal-templates (groups/<type>-<slug>/).
# Ref DISTINCTE de team-<slug> (réservé à l'identité Keycloak, projection O2) → pas de double-source.
# Une SQUAD déclarée reste SANS membres réels (annotation squad-members = visés, PAS spec.members)
# → ZÉRO accès ; l'identité + le rôle + les vrais membres naissent à l'ONBOARDING (Onboard Squad).
#
# Le picker de PARENT filtre au type du niveau au-dessus (créer une squad → choisir une tribe ;
# une tribe → un domain ; …). Annotations d'exposition/visibilité (SL0/SL2/SL4) : product /
# audience portal / gated-by tech-lead (visibilité+exécution réservées aux tech-leads).
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: declare-squad
  title: Create Group
  description: >-
    Déclare un groupe d'organisation TYPÉ (organization | department | domain | tribe | squad)
    rattaché à son parent. Une squad déclarée est SANS accès — l'onboarding (Onboard Squad) lui
    donnera l'identité Keycloak + le rôle.
  annotations:
    platform.kratix.io/exposure: product
    platform.kratix.io/audience: portal
    platform.kratix.io/gated-by: tech-lead
    platform.kratix.io/marketplace: "true"
    platform.kratix.io/provider: portal
    # G3 — logo produit (data-driven). Pour une promesse factory : spec.curation.logo-url →
    # platform.kratix.io/logo-url (passthrough générique platform.kratix.io/*). Ici produit NATIF
    # → annotation directe. Hôte self-hosted (Harbor) autorisé par la CSP img-src + l'allowlist plugin.
    platform.kratix.io/logo-url: https://harbor.212-47-226-56.nip.io/favicon.ico
  tags: [portal, group, organization, hierarchy]
spec:
  type: portal-product
  owner: group:default/team-portal
  parameters:
    - title: Groupe
      required: [slug, type]
      properties:
        slug:
          title: Slug
          type: string
          pattern: '^[a-z][a-z0-9-]*$'
          maxLength: 63
          description: >-
            Identifiant court (minuscules, chiffres, tirets). Ex. « payment ». Combiné au type
            pour former le nom du groupe : <type>-<slug> (ex. squad-payment, tribe-core).
        displayName:
          title: Nom affiché
          type: string
          description: Nom lisible du groupe (optionnel).
        type:
          title: Type de groupe
          type: string
          default: squad
          enum: [organization, department, domain, tribe, squad]
          enumNames: [Organization, Department, Domain, Tribe, Squad]
          description: >-
            Niveau dans la hiérarchie : organization > department > domain > tribe > squad.
            Chaque groupe est rattaché à un parent du niveau juste au-dessus (organization = racine).
      # ⚠️ Gotcha rjsf/Backstage : les ui:* d'un champ de MÊME nom dans plusieurs branches oneOf
      # sont FUSIONNÉS par chemin de donnée (dernier gagnant) → un unique `parent` aurait un seul
      # catalogFilter pour tous les types. Donc un nom de propriété DISTINCT par niveau (chemin
      # unique → catalogFilter correct). Le parent effectif est recomposé côté step (nunjucks `or`).
      dependencies:
        type:
          oneOf:
            # organization = RACINE : aucun parent.
            - properties:
                type:
                  enum: [organization]
            - properties:
                type:
                  enum: [department]
                parentOrganization:
                  title: Parent (Organization)
                  type: string
                  description: L'organization à laquelle rattacher ce department.
                  ui:field: EntityPicker
                  ui:options:
                    catalogFilter:
                      kind: Group
                      spec.type: organization
              required: [parentOrganization]
            - properties:
                type:
                  enum: [domain]
                parentDepartment:
                  title: Parent (Department)
                  type: string
                  description: Le department auquel rattacher ce domain.
                  ui:field: EntityPicker
                  ui:options:
                    catalogFilter:
                      kind: Group
                      spec.type: department
              required: [parentDepartment]
            - properties:
                type:
                  enum: [tribe]
                parentDomain:
                  title: Parent (Domain)
                  type: string
                  description: Le domain auquel rattacher cette tribe.
                  ui:field: EntityPicker
                  ui:options:
                    catalogFilter:
                      kind: Group
                      spec.type: domain
              required: [parentDomain]
            # squad = niveau FEUILLE onboardable : parent = une tribe + membres VISÉS (indicatifs).
            - properties:
                type:
                  enum: [squad]
                parentTribe:
                  title: Parent (Tribe)
                  type: string
                  description: La tribe à laquelle rattacher cette squad.
                  ui:field: EntityPicker
                  ui:options:
                    catalogFilter:
                      kind: Group
                      spec.type: tribe
                members:
                  title: Membres visés
                  type: array
                  default: []
                  items:
                    type: string
                  description: >-
                    Usernames Keycloak des membres visés — INDICATIFS : matérialisés (Keycloak)
                    à l'onboarding, pas maintenant (la squad déclarée n'a AUCUN accès).
                  ui:field: CatalogNamePicker
                  ui:options:
                    catalogFilter:
                      kind: User
              required: [parentTribe]
  steps:
    - id: fetch
      name: Générer la fiche du groupe
      action: fetch:template
      input:
        url: https://github.com/Younesic/platform-gitops/tree/main/bootstrap/manifests/backstage/templates/skeleton-group
        values:
          slug: ${{ parameters.slug }}
          displayName: ${{ parameters.displayName }}
          type: ${{ parameters.type }}
          # parent effectif = le champ du niveau choisi (un seul est renseigné ; organization = aucun).
          parent: ${{ parameters.parentOrganization or parameters.parentDepartment or parameters.parentDomain or parameters.parentTribe }}
          members: ${{ parameters.members }}
          declaredBy: ${{ user.entity.metadata.name if user.entity else '' }}
    - id: pr
      name: Ouvrir la PR de déclaration
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=Younesic&repo=portal-templates
        branchName: create-group-${{ parameters.type }}-${{ parameters.slug }}
        targetBranchName: main
        targetPath: groups/${{ parameters.type }}-${{ parameters.slug }}
        title: 'Create Group « ${{ parameters.type }}-${{ parameters.slug }} »'
        description: >-
          Déclaration du groupe « ${{ parameters.type }}-${{ parameters.slug }} » (Portal, non-Kratix).
          Après merge (= décision d'admission), le Group est ingéré au catalogue et prend sa place
          dans la hiérarchie (parent). Une squad est ensuite ONBOARDÉE (Onboard Squad) pour son rôle.
  output:
    links:
      - title: Pull request de la déclaration
        url: ${{ steps.pr.output.remoteUrl }}
    text:
      - title: Prochaine étape
        content: >-
          Après merge, le groupe apparaît au catalogue sous son parent. Pour une SQUAD :
          lancez « Onboard Squad » pour lui donner une identité Keycloak + un rôle (consumer/provider).
