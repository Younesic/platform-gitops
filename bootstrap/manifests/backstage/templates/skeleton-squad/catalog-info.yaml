apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: squad-${{ values.slug }}
  title: ${{ values.displayName if values.displayName else values.slug }} (squad déclarée)
  description: >-
    Squad déclarée via le Portal — PAS encore onboardée : aucune identité Keycloak,
    aucun rôle, aucun accès. Ref distincte de team-${{ values.slug }} (réservé à
    l'identité Keycloak). À onboarder pour obtenir le rôle (consumer/provider).
  annotations:
    platform.kratix.io/squad-status: declared
    platform.kratix.io/squad-slug: ${{ values.slug }}
    platform.kratix.io/squad-members: ${{ values.members | join(",") }}
    platform.kratix.io/declared-by: ${{ values.declaredBy }}
  tags: [portal, squad, declared]
spec:
  # Component NON-Group (option iii) : la déclaration n'est pas une identité — pas de
  # memberOf, pas d'ownership par les membres → aucun accès. L'identité (Group team-<slug>)
  # naît à l'onboarding (SL3), source unique = Keycloak.
  type: squad-declaration
  lifecycle: production
  owner: group:default/team-portal
