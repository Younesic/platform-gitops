apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-config
  namespace: backstage
data:
  app-config.yaml: |
    app:
      title: Attijari Portal
      baseUrl: https://backstage.212-47-226-56.nip.io
    organization:
      name: Attijari

    # G3 — politique de validation des logos (frontend, lue par le plugin kratix-marketplace
    # via configApi ; déclarée @deepVisibility frontend dans son config.d.ts). Allowlist d'hôtes
    # MIROIR de backend.csp.img-src : le plugin ne rend un <img> QUE pour un hôte autorisé (sinon
    # placeholder propre, pas d'image cassée) → les 2 gates (plugin client + CSP navigateur) s'accordent.
    kratixMarketplace:
      logo:
        requireHttps: true
        allowedHosts:
          - harbor.212-47-226-56.nip.io

    backend:
      baseUrl: https://backstage.212-47-226-56.nip.io
      listen:
        port: 7007
        host: 0.0.0.0
      csp:
        connect-src: ["'self'", 'http:', 'https:']
        # G3 — logos produits/providers déclarés (spec.curation.logo-url → annotation
        # platform.kratix.io/logo-url) : la CSP par défaut de Backstage est img-src 'self' data:
        # → tout hôte EXTERNE est bloqué par le navigateur (le logo ne s'affiche pas). On ouvre
        # une ALLOWLIST SERRÉE (jamais img-src * ni https: large) : self + data: + Harbor (registre
        # self-hosted, hôte de confiance où les providers déposent leurs logos). Ajouter un hôte
        # = une ligne ici (miroir de kratixMarketplace.logo.allowedHosts côté plugin).
        img-src: ["'self'", 'data:', 'https://harbor.212-47-226-56.nip.io']
      cors:
        origin: https://backstage.212-47-226-56.nip.io
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true
      auth:
        keys:
          - secret: ${BACKEND_SECRET}
      database:
        client: pg
        pluginDivisionMode: schema
        connection:
          host: ${POSTGRES_HOST}
          port: ${POSTGRES_PORT}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}
          database: ${POSTGRES_DATABASE}

    integrations:
      github:
        - host: github.com
          token: ${GITHUB_TOKEN}

    # aperçu de schéma pour le composer de présentation (dérive les champs d'une
    # source helm/crossplane À LA CRÉATION) — service in-cluster, reléguée derrière
    # le proxy authentifié (le navigateur ne joint pas un ClusterIP directement).
    proxy:
      endpoints:
        '/schema-derive':
          target: http://schema-derive.default.svc.cluster.local:8080
          allowedMethods: [POST]
          # défaut = exige un utilisateur Backstage authentifié (anti-SSRF) ;
          # le frontend attache l'identité via fetchApi.
        '/harbor':
          # Registry Helm : le Studio liste les charts/versions (picker OCI de Settings).
          # Lecture anonyme (projet platform PUBLIC) ; GET seul ; pas de secret exposé
          # → on lève l'exigence d'auth backstage du proxy (sinon 401 « Missing credentials »).
          target: https://harbor.212-47-226-56.nip.io
          allowedMethods: [GET]
          credentials: dangerously-allow-unauthenticated
          changeOrigin: true
        '/github-api':
          # API GitHub : le Studio liste les TAGS d'un repo (picker Crossplane de Settings).
          # Injecte le token plateforme (repos privés) → DOIT rester AUTHENTIFIÉ (défaut) :
          # sinon proxy ouvert qui prête le token. GET seul ; le frontend attache l'identité
          # backstage via fetchApi.
          target: https://api.github.com
          allowedMethods: [GET]
          changeOrigin: true
          headers:
            Authorization: token ${GITHUB_TOKEN}
            Accept: application/vnd.github+json

    # === Sign-in : Guest + Keycloak (les 2 cartes, comme en local) ===
    auth:
      environment: production
      session:
        secret: ${AUTH_SESSION_SECRET}
      providers:
        guest: {}
        oidc:
          production:
            metadataUrl: https://keycloak.212-47-226-56.nip.io/realms/platform/.well-known/openid-configuration
            clientId: backstage
            clientSecret: ${KEYCLOAK_CLIENT_SECRET}
            prompt: auto
            callbackUrl: https://backstage.212-47-226-56.nip.io/api/auth/oidc/handler/frame
            additionalScopes: groups
            signIn:
              resolvers:
                - resolver: emailLocalPartMatchingUserEntityName
                  dangerouslyAllowSignInWithoutUserInCatalog: true

    techdocs:
      builder: local
      generator:
        runIn: local
      publisher:
        type: local

    catalog:
      # Modèle Syntasso PUSH : Backstage lit les Components que les WORKFLOWS Kratix poussent
      # dans kratix-state/backstage/ (Resource Configure -> Component du provisionné).
      providers:
        github:
          kratixCatalog:
            organization: Younesic
            # ANCRÉ sur le sous-dossier backstage/ écrit par le conteneur push :
            #   resources/…    (Resource Configure -> fiches Component+Resource)
            #   dependencies/… (Promise Configure  -> Templates poussés)
            # ⚠️ Kratix écrit aussi ses CANARIES (kratix-canary-{namespace,configmap}.yaml,
            # manifestes k8s bruts) sous backstage/ — un glob trop large les matche, le
            # catalogue les rejette (kind Namespace/ConfigMap interdit) et TOUTE la
            # location tombe en erreur -> plus AUCUNE ingestion depuis kratix-state.
            # Le squelette de claim (skeleton/claim.yaml) est lui aussi hors-glob à dessein.
            catalogPath: /backstage/*/**/backstage/*.yaml
            filters:
              repository: kratix-state
            schedule:
              frequency: { minutes: 1 }
              timeout: { minutes: 2 }
          # G2 — GROUPES d'org déclarés (Portal, produit « Create Group ») : Groups NATIFS typés
          # <type>-<slug> (organization|department|domain|tribe|squad) poussés en PR sous
          # portal-templates/groups/<type>-<slug>/catalog-info.yaml, ingérés ICI après merge
          # (= décision d'admission). NON-Kratix. spec.parent → hiérarchie native au catalogue.
          # Ref <type>-<slug> ≠ team-<slug> → pas de collision avec la projection Keycloak (O2).
          portalSquads:
            organization: Younesic
            catalogPath: /groups/**/catalog-info.yaml
            filters:
              repository: portal-templates
            schedule:
              frequency: { minutes: 2 }
              timeout: { minutes: 2 }
        # Connecteur UNIVERSEL http-entities (module local du backend) : chaque
        # source de données = UN BLOC DE CONFIG (url + auth + mapping gabarits),
        # JAMAIS du code — Keycloak n'est que la première source ; AD/Harbor/API
        # client = un bloc de plus ici. Creds via env (SealedSecret
        # backstage-http-entities). NB : config lue au boot → rollout au changement.
        httpEntities:
          keycloakUsers:
            # briefRepresentation=false : renvoie les ATTRIBUTS du user (dont `tech-lead`,
            # projeté en annotation ci-dessous — gate SL2, même mécanisme que le rôle O2).
            url: https://keycloak.212-47-226-56.nip.io/admin/realms/platform/users?max=500&briefRepresentation=false
            auth:
              type: oauth2ClientCredentials
              tokenUrl: https://keycloak.212-47-226-56.nip.io/realms/master/protocol/openid-connect/token
              clientId: ${HTTP_ENTITIES_KC_CLIENT_ID}
              clientSecret: ${HTTP_ENTITIES_KC_CLIENT_SECRET}
            entity:
              kind: User
              name: '{username}'
              title: '{firstName} {lastName}'
              # SL2 — statut tech-lead PROJETÉ depuis l'attribut Keycloak (stocké en TABLEAU
              # → index .0) vers l'annotation lue par la permission-policy. Attribut absent
              # → gabarit '' → annotation OMISE (le module skip les vides : non-régression).
              annotations:
                platform.kratix.io/tech-lead: '{attributes.tech-lead.0}'
            schedule:
              frequency: { minutes: 10 }
              timeout: { minutes: 2 }
          keycloakGroups:
            # briefRepresentation=false : sinon Keycloak ne renvoie PAS les attributs
            # du groupe (dont `role`, posé par la promesse keycloak-group — onboarding O1).
            url: https://keycloak.212-47-226-56.nip.io/admin/realms/platform/groups?max=200&briefRepresentation=false
            auth:
              type: oauth2ClientCredentials
              tokenUrl: https://keycloak.212-47-226-56.nip.io/realms/master/protocol/openid-connect/token
              clientId: ${HTTP_ENTITIES_KC_CLIENT_ID}
              clientSecret: ${HTTP_ENTITIES_KC_CLIENT_SECRET}
            # Sous-ressource Keycloak : les MEMBRES du groupe. Rangés sous
            # _expand.members, projetés en Group.spec.members (slugifiés pour matcher
            # les User.name émis par la source keycloakUsers) → Backstage dérive les
            # relations memberOf sur les users → ownershipEntityRefs (base du RBAC).
            expand:
              members:
                url: https://keycloak.212-47-226-56.nip.io/admin/realms/platform/groups/{id}/members?max=500
            entity:
              kind: Group
              name: '{name}'
              # rôle de gouvernance PROJETÉ depuis l'attribut Keycloak (stocké en TABLEAU
              # → index .0) vers l'annotation lue par la permission-policy (onboarding O3).
              # Gabarit vide (groupe sans rôle) → annotation OMISE (module : skip si vide).
              annotations:
                platform.kratix.io/role: '{attributes.role.0}'
              specLists:
                members:
                  path: _expand.members
                  template: '{username}'
                  slugify: true
            schedule:
              frequency: { minutes: 10 }
              timeout: { minutes: 2 }
      import:
        entityFilename: catalog-info.yaml
        pullRequestBranchName: backstage-integration
      rules:
        - allow: [Component, System, API, Resource, Location, Template, Domain, Group, User]
      # (les locations examples/* du scaffold ont été retirées : absentes de l'image,
      # elles échouaient en NotFoundError à chaque cycle de processing)
      locations:
        # Template utilitaire « en faire la règle » (Inc 3 option a) — cible du deep-link
        # du bouton CompoundComposer ; action kratix:promote-usage-hint (PR sur portal-templates).
        - type: url
          target: https://github.com/Younesic/platform-gitops/blob/main/bootstrap/manifests/backstage/templates/promote-usage-hint.yaml
          rules:
            - allow: [Template]
        # SL1 — provider Portal (Group natif) + produit « Déclarer une squad » (Template natif).
        - type: url
          target: https://github.com/Younesic/platform-gitops/blob/main/bootstrap/manifests/backstage/templates/team-portal.yaml
          rules:
            - allow: [Group]
        - type: url
          target: https://github.com/Younesic/platform-gitops/blob/main/bootstrap/manifests/backstage/templates/declare-squad.yaml
          rules:
            - allow: [Template]
        # SL3 — produit « Onboarder une squad » (Portal, gated tech-lead).
        - type: url
          target: https://github.com/Younesic/platform-gitops/blob/main/bootstrap/manifests/backstage/templates/onboard-squad.yaml
          rules:
            - allow: [Template]

    kubernetes:
      serviceLocatorMethod: { type: multiTenant }
      clusterLocatorMethods:
        - type: config
          clusters:
            - name: k8s-for-kratix
              title: Plateforme
              url: https://kubernetes.default.svc
              authProvider: serviceAccount
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              skipMetricsLookup: true
      # Types PAR DÉFAUT fetchés par l'onglet Kubernetes, restreints à ce que le SA
      # backstage-readonly sait lister (sinon 403 -> carte « Error Reporting » sur chaque
      # fiche). Exclus À DESSEIN : secrets (sensible), persistentvolume(claim)s,
      # horizontalpodautoscalers (pas de RBAC).
      objectTypes:
        - pods
        - services
        - configmaps
        - limitranges
        - resourcequotas
        - deployments
        - replicasets
        - statefulsets
        - daemonsets
        - jobs
        - cronjobs
        - ingresses
      # customResources : GÉNÉRÉS automatiquement — voir la ConfigMap
      # backstage-config-dynamic (2e fichier --config du backend), régénérée par
      # le CronJob backstage-customresources-sync depuis les CRDs des familles
      # plateforme (nouvelle promesse => kind détecté => restart auto ssi la liste
      # change). NE PAS redéclarer customResources ici : les tableaux de config
      # sont REMPLACÉS par le dernier fichier, pas fusionnés.
      # NB : le plugin EXIGE un group non-vide -> les ressources CORE (group "" :
      # namespaces, resourcequotas) ne peuvent PAS y figurer.

    # === INGESTOR : Templates depuis les CRD (Brique A) + claims en entités (Brique B) ===
    kubernetesIngestor:
      # Niveau 3 (le provisionné) : on INGÈRE le claim en Component type kratix-resource (watch,
      # status live). Pas de conteneur push -> pas de doublon. La page ADAPTÉE vient de
      # EntityPage.tsx : isComponentType('kratix-resource') -> plugin kubernetes-resources (graphe).
      components:
        enabled: false
        disableDefaultWorkloadTypes: true
        customWorkloadTypes:
          - { group: platform.example.io, apiVersion: v1alpha1, plural: workspaces, defaultType: kratix-resource }
        excludedNamespaces: [kube-system, kube-public]
        taskRunner: { frequency: 30, timeout: 600 }
      genericCRDTemplates:
        # AUTO-DÉCOUVERTE : toute promesse dont la CRD porte ce label -> Template automatiquement.
        # Kratix propage le label depuis promise.spec.api.metadata.labels. Zéro edit par promesse.
        crdLabelSelector:
          key: platform.example.io/portal
          value: "true"
        publishPhase:
          target: github
          allowRepoSelection: false
          allowedTargets: ['github.com']
          git:
            repoUrl: github.com?owner=Younesic&repo=portal-templates
            targetBranch: main

    permission:
      enabled: true
