apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-config
  namespace: backstage
data:
  app-config.yaml: |
    app:
      title: Attijari Portal
      baseUrl: https://backstage.212-47-226-56.nip.io
    organization:
      name: Attijari

    backend:
      baseUrl: https://backstage.212-47-226-56.nip.io
      listen:
        port: 7007
        host: 0.0.0.0
      csp:
        connect-src: ["'self'", 'http:', 'https:']
      cors:
        origin: https://backstage.212-47-226-56.nip.io
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true
      auth:
        keys:
          - secret: ${BACKEND_SECRET}
      database:
        client: pg
        pluginDivisionMode: schema
        connection:
          host: ${POSTGRES_HOST}
          port: ${POSTGRES_PORT}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}
          database: ${POSTGRES_DATABASE}

    integrations:
      github:
        - host: github.com
          token: ${GITHUB_TOKEN}

    # === Sign-in : Guest + Keycloak (les 2 cartes, comme en local) ===
    auth:
      environment: production
      session:
        secret: ${AUTH_SESSION_SECRET}
      providers:
        guest: {}
        oidc:
          production:
            metadataUrl: https://keycloak.212-47-226-56.nip.io/realms/platform/.well-known/openid-configuration
            clientId: backstage
            clientSecret: ${KEYCLOAK_CLIENT_SECRET}
            prompt: auto
            callbackUrl: https://backstage.212-47-226-56.nip.io/api/auth/oidc/handler/frame
            additionalScopes: groups
            signIn:
              resolvers:
                - resolver: emailLocalPartMatchingUserEntityName
                  dangerouslyAllowSignInWithoutUserInCatalog: true

    techdocs:
      builder: local
      generator:
        runIn: local
      publisher:
        type: local

    catalog:
      # Modèle Syntasso PUSH : Backstage lit les Components que les WORKFLOWS Kratix poussent
      # dans kratix-state/backstage/ (Resource Configure -> Component du provisionné).
      providers:
        github:
          kratixCatalog:
            organization: Younesic
            # ANCRÉ sur le sous-dossier backstage/ écrit par le conteneur push :
            #   resources/…    (Resource Configure -> fiches Component+Resource)
            #   dependencies/… (Promise Configure  -> Templates poussés)
            # ⚠️ Kratix écrit aussi ses CANARIES (kratix-canary-{namespace,configmap}.yaml,
            # manifestes k8s bruts) sous backstage/ — un glob trop large les matche, le
            # catalogue les rejette (kind Namespace/ConfigMap interdit) et TOUTE la
            # location tombe en erreur -> plus AUCUNE ingestion depuis kratix-state.
            # Le squelette de claim (skeleton/claim.yaml) est lui aussi hors-glob à dessein.
            catalogPath: /backstage/*/**/backstage/*.yaml
            filters:
              repository: kratix-state
            schedule:
              frequency: { minutes: 1 }
              timeout: { minutes: 2 }
        # Connecteur UNIVERSEL http-entities (module local du backend) : chaque
        # source de données = UN BLOC DE CONFIG (url + auth + mapping gabarits),
        # JAMAIS du code — Keycloak n'est que la première source ; AD/Harbor/API
        # client = un bloc de plus ici. Creds via env (SealedSecret
        # backstage-http-entities). NB : config lue au boot → rollout au changement.
        httpEntities:
          keycloakUsers:
            url: https://keycloak.212-47-226-56.nip.io/admin/realms/platform/users?max=500
            auth:
              type: oauth2ClientCredentials
              tokenUrl: https://keycloak.212-47-226-56.nip.io/realms/master/protocol/openid-connect/token
              clientId: ${HTTP_ENTITIES_KC_CLIENT_ID}
              clientSecret: ${HTTP_ENTITIES_KC_CLIENT_SECRET}
            entity:
              kind: User
              name: '{username}'
              title: '{firstName} {lastName}'
            schedule:
              frequency: { minutes: 10 }
              timeout: { minutes: 2 }
          keycloakGroups:
            url: https://keycloak.212-47-226-56.nip.io/admin/realms/platform/groups?max=200
            auth:
              type: oauth2ClientCredentials
              tokenUrl: https://keycloak.212-47-226-56.nip.io/realms/master/protocol/openid-connect/token
              clientId: ${HTTP_ENTITIES_KC_CLIENT_ID}
              clientSecret: ${HTTP_ENTITIES_KC_CLIENT_SECRET}
            entity:
              kind: Group
              name: '{name}'
            schedule:
              frequency: { minutes: 10 }
              timeout: { minutes: 2 }
      import:
        entityFilename: catalog-info.yaml
        pullRequestBranchName: backstage-integration
      rules:
        - allow: [Component, System, API, Resource, Location, Template, Domain, Group, User]
      # (les locations examples/* du scaffold ont été retirées : absentes de l'image,
      # elles échouaient en NotFoundError à chaque cycle de processing)

    kubernetes:
      serviceLocatorMethod: { type: multiTenant }
      clusterLocatorMethods:
        - type: config
          clusters:
            - name: k8s-for-kratix
              title: Plateforme
              url: https://kubernetes.default.svc
              authProvider: serviceAccount
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              skipMetricsLookup: true
      # Types PAR DÉFAUT fetchés par l'onglet Kubernetes, restreints à ce que le SA
      # backstage-readonly sait lister (sinon 403 -> carte « Error Reporting » sur chaque
      # fiche). Exclus À DESSEIN : secrets (sensible), persistentvolume(claim)s,
      # horizontalpodautoscalers (pas de RBAC).
      objectTypes:
        - pods
        - services
        - configmaps
        - limitranges
        - resourcequotas
        - deployments
        - replicasets
        - statefulsets
        - daemonsets
        - jobs
        - cronjobs
        - ingresses
      # customResources : GÉNÉRÉS automatiquement — voir la ConfigMap
      # backstage-config-dynamic (2e fichier --config du backend), régénérée par
      # le CronJob backstage-customresources-sync depuis les CRDs des familles
      # plateforme (nouvelle promesse => kind détecté => restart auto ssi la liste
      # change). NE PAS redéclarer customResources ici : les tableaux de config
      # sont REMPLACÉS par le dernier fichier, pas fusionnés.
      # NB : le plugin EXIGE un group non-vide -> les ressources CORE (group "" :
      # namespaces, resourcequotas) ne peuvent PAS y figurer.

    # === INGESTOR : Templates depuis les CRD (Brique A) + claims en entités (Brique B) ===
    kubernetesIngestor:
      # Niveau 3 (le provisionné) : on INGÈRE le claim en Component type kratix-resource (watch,
      # status live). Pas de conteneur push -> pas de doublon. La page ADAPTÉE vient de
      # EntityPage.tsx : isComponentType('kratix-resource') -> plugin kubernetes-resources (graphe).
      components:
        enabled: false
        disableDefaultWorkloadTypes: true
        customWorkloadTypes:
          - { group: platform.example.io, apiVersion: v1alpha1, plural: workspaces, defaultType: kratix-resource }
        excludedNamespaces: [kube-system, kube-public]
        taskRunner: { frequency: 30, timeout: 600 }
      genericCRDTemplates:
        # AUTO-DÉCOUVERTE : toute promesse dont la CRD porte ce label -> Template automatiquement.
        # Kratix propage le label depuis promise.spec.api.metadata.labels. Zéro edit par promesse.
        crdLabelSelector:
          key: platform.example.io/portal
          value: "true"
        publishPhase:
          target: github
          allowRepoSelection: false
          allowedTargets: ['github.com']
          git:
            repoUrl: github.com?owner=Younesic&repo=portal-templates
            targetBranch: main

    permission:
      enabled: true
